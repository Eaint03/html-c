<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Aircon — Dashboard</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f5f5f0; min-height: 100vh; padding: 20px; }
    .page { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 4px; }
    .header-left h1 { font-size: 18px; font-weight: 500; color: #1a1a1a; }
    .header-left p { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-online { background: #d4edda; color: #1a7a3c; }
    .badge-offline { background: #fde8e8; color: #c0392b; }
    .card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 16px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .metric { background: #f5f5f0; border-radius: 8px; padding: 12px; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-value { font-size: 16px; font-weight: 500; color: #1a1a1a; }
    .countdown-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 24px 16px; text-align: center; }
    .countdown-label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .countdown-time { font-size: 48px; font-weight: 500; color: #1a1a1a; letter-spacing: -1px; }
    .countdown-sub { font-size: 12px; color: #888; margin-top: 6px; }
    .aircon-off-card { background: #fff; border-radius: 12px; border: 1px solid #e5e5e0; padding: 24px 16px; text-align: center; }
    .off-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; background: #fde8e8; color: #c0392b; margin-bottom: 10px; }
    .off-time { font-size: 11px; color: #aaa; margin-top: 6px; }
    .section-title { font-size: 12px; font-weight: 500; color: #1a1a1a; margin-bottom: 12px; }
    .divider { height: 1px; background: #f0f0f0; margin: 10px 0; }
    .control-row { display: flex; align-items: center; justify-content: space-between; }
    .control-info p { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .control-info span { font-size: 11px; color: #888; }
    .toggle { position: relative; width: 44px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ccc; border-radius: 12px; cursor: pointer; transition: background 0.2s; }
    .slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform 0.2s; }
    input:checked + .slider { background: #1a1a1a; }
    input:checked + .slider:before { transform: translateX(20px); }
    .btn-primary { background: #1a1a1a; color: #fff; border: none; border-radius: 10px; padding: 12px; font-size: 14px; font-weight: 500; width: 100%; cursor: pointer; margin-top: 4px; }
    .btn-primary:hover { background: #333; }
    .btn-outline-green { background: transparent; color: #1a7a3c; border: 1px solid #1a7a3c; border-radius: 10px; padding: 12px; font-size: 14px; width: 100%; cursor: pointer; margin-top: 4px; font-weight: 500; }
    .btn-outline-red { background: transparent; color: #c0392b; border: 1px solid #c0392b; border-radius: 10px; padding: 12px; font-size: 14px; width: 100%; cursor: pointer; margin-top: 4px; font-weight: 500; }
    .nav { background: #fff; border-top: 1px solid #e5e5e0; display: flex; justify-content: space-around; padding: 10px 0 16px; position: fixed; bottom: 0; left: 0; right: 0; }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 11px; color: #888; cursor: pointer; text-decoration: none; }
    .nav-item.active { color: #1a1a1a; }
    .nav-icon { font-size: 20px; }
    .bottom-space { height: 70px; }
    .hidden { display: none; }
    .occupied-badge { display: inline-flex; align-items: center; gap: 4px; background: #d4edda; color: #1a7a3c; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
    .empty-badge { display: inline-flex; align-items: center; gap: 4px; background: #f5f5f0; color: #888; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; }
  </style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="header-left">
      <h1>Smart Aircon</h1>
      <p id="headerSub">Loading...</p>
    </div>
    <div class="badge badge-offline" id="deviceBadge">
      <span class="badge-dot"></span>
      <span id="deviceBadgeText">Offline</span>
    </div>
  </div>

  <div class="metric-grid">
    <div class="metric">
      <p class="metric-label">Presence</p>
      <p class="metric-value" id="metricPresence">—</p>
    </div>
    <div class="metric">
      <p class="metric-label">Room</p>
      <p class="metric-value" id="metricRoom" style="font-size:13px; padding-top:2px;">—</p>
    </div>
    <div class="metric">
      <p class="metric-label">Brand</p>
      <p class="metric-value" id="metricBrand" style="font-size:13px; padding-top:2px;">—</p>
    </div>
  </div>

  <div class="countdown-card hidden" id="countdownCard">
    <p class="countdown-label">Room is empty — turning off in</p>
    <p class="countdown-time" id="countdownDisplay">0:00</p>
    <p class="countdown-sub">minutes remaining</p>
  </div>

  <div class="aircon-off-card hidden" id="airconOffCard">
    <div class="off-badge">
      <span class="badge-dot"></span> Aircon is OFF
    </div>
    <p style="font-size: 13px; color: #888;">Turned off automatically</p>
    <p class="off-time" id="offTime"></p>
  </div>

  <div class="card">
    <p class="section-title">Controls</p>
    <div class="control-row">
      <div class="control-info">
        <p>Auto mode</p>
        <span>Turn off when empty</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="autoToggle" onchange="toggleAuto(this.checked)" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="divider"></div>
    <div class="control-row">
      <div class="control-info">
        <p>Aircon</p>
        <span id="airconStatusText">—</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="airconToggle" onchange="toggleAircon(this.checked)">
        <span class="slider"></span>
      </label>
    </div>
    <div class="divider"></div>
    <p class="section-title" style="margin-top: 8px;">Manual override</p>
    <button class="btn-outline-green hidden" id="btnKeepOn" onclick="keepAirconOn()">Keep aircon ON</button>
    <button class="btn-outline-red hidden" id="btnTurnOff" onclick="turnOffNow()">Turn off now</button>
    <button class="btn-primary hidden" id="btnTurnOn" onclick="turnOnNow()">Turn aircon ON</button>
  </div>

  <div class="bottom-space"></div>
</div>

<nav class="nav">
  <a class="nav-item active" href="dashboard.html">
    <span class="nav-icon">⌂</span>
    <span>Home</span>
  </a>
  <a class="nav-item" href="settings.html">
    <span class="nav-icon">⚙</span>
    <span>Settings</span>
  </a>
</nav>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCRK_ATJ9QVAJvOHnsFDE216udnKIdDp-Y",
    authDomain: "smart-aircon-b978c.firebaseapp.com",
    databaseURL: "https://smart-aircon-b978c-default-rtdb.firebaseio.com",
    projectId: "smart-aircon-b978c",
    storageBucket: "smart-aircon-b978c.firebasestorage.app",
    messagingSenderId: "733250370463",
    appId: "1:733250370463:web:e918690b76ba00a79fdbaa"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let countdownInterval = null;
  let settings = {};
  let state = {};

  db.ref('settings').on('value', snap => {
    settings = snap.val() || {};
    document.getElementById('metricBrand').textContent = settings.brand || '—';
    document.getElementById('metricRoom').textContent  = settings.room  || '—';
    updateHeader();
  });

  db.ref('state').on('value', snap => {
    state = snap.val() || {};
    updateUI();
  });

  function updateHeader() {
    const room   = settings.room  || 'My Room';
    const online = state.online   ?? false;
    document.getElementById('headerSub').textContent =
      room + ' · ' + (online ? 'Connected' : 'Offline');
  }

  function updateUI() {
    const occupied    = state.occupied    ?? false;
    const airconOn    = state.airconOn    ?? false;
    const counting    = state.counting    ?? false;
    const secondsLeft = state.secondsLeft ?? 0;
    const autoMode    = state.autoMode    ?? true;
    const offTime     = state.offTime     ?? null;
    const online      = state.online      ?? false;

    updateHeader();

    // Device badge
    const badge = document.getElementById('deviceBadge');
    badge.className = 'badge ' + (online ? 'badge-online' : 'badge-offline');
    document.getElementById('deviceBadgeText').textContent = online ? 'Online' : 'Offline';

    // Presence
    const presenceEl = document.getElementById('metricPresence');
    presenceEl.textContent = occupied ? 'Occupied' : 'Empty';
    presenceEl.style.color = occupied ? '#1a7a3c' : '#888';

    // Toggles
    document.getElementById('autoToggle').checked  = autoMode;
    document.getElementById('airconToggle').checked = airconOn;
    document.getElementById('airconStatusText').textContent =
      airconOn ? 'Currently ON' : 'Currently OFF';

    hide('countdownCard');
    hide('airconOffCard');
    hide('btnKeepOn');
    hide('btnTurnOff');
    hide('btnTurnOn');

    if (counting && secondsLeft > 0) {
      show('countdownCard');
      startCountdown(secondsLeft);
      show('btnKeepOn');
      show('btnTurnOff');
    } else if (!airconOn) {
      show('airconOffCard');
      if (offTime) {
        document.getElementById('offTime').textContent =
          'Turned off at ' + new Date(offTime).toLocaleTimeString();
      } else {
        document.getElementById('offTime').textContent = '';
      }
      show('btnTurnOn');
    } else {
      show('btnTurnOff');
    }
  }

  function startCountdown(seconds) {
    if (countdownInterval) clearInterval(countdownInterval);
    let remaining = seconds;
    updateCountdownDisplay(remaining);
    countdownInterval = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(countdownInterval);
        remaining = 0;
      }
      updateCountdownDisplay(remaining);
    }, 1000);
  }

  function updateCountdownDisplay(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('countdownDisplay').textContent =
      m + ':' + String(s).padStart(2, '0');
  }

  function toggleAuto(on) {
    db.ref('state/autoMode').set(on);
  }

  function toggleAircon(on) {
    db.ref('state').update({
      airconOn: on,
      counting: false,
      offTime: on ? null : Date.now()
    });
    db.ref('command').set(on ? 'AIRCON_ON' : 'AIRCON_OFF');
  }

  function keepAirconOn() {
    db.ref('state').update({ counting: false, secondsLeft: 0 });
    db.ref('command').set('CANCEL_TIMER');
  }

  function turnOffNow() {
    db.ref('state').update({
      airconOn: false,
      counting: false,
      offTime: Date.now()
    });
    db.ref('command').set('AIRCON_OFF');
  }

  function turnOnNow() {
    db.ref('state').update({ airconOn: true, offTime: null });
    db.ref('command').set('AIRCON_ON');
  }

  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function hide(id) { document.getElementById(id).classList.add('hidden'); }
</script>
</body>
</html>
