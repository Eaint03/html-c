<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>

<body>

<h2>Scanner Test</h2>

<button onclick="startScanner()">Start</button>

<div id="scanner" style="width:300px;height:300px;background:#eee;"></div>

<script>
function startScanner() {
    alert("Starting...");

    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: {
                facingMode: "environment"
            }
        },
        decoder: {
            readers: ["code_128_reader"]
        }
    }, function(err) {
        if (err) {
            console.log(err);
            alert("Error starting camera");
            return;
        }

        Quagga.start();
    });

    Quagga.onDetected(function(data) {
        alert("Detected: " + data.codeResult.code);
        Quagga.stop();
    });
}
</script>

</body>
</html>
