<!DOCTYPE html>
<html>
<head>
    <title>Auto-Scan Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; }
        .hidden { display: none; }
        
        #reader-container { position: relative; width: 100%; max-width: 400px; margin: auto; }

        /* The Focus Box */
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60px; border: 3px solid #00ff00; /* Green for "Ready" */
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6); z-index: 10; pointer-events: none;
        }

        .controls { padding: 20px; }
        button {
            padding: 15px; margin: 10px; width: 80%; max-width: 300px;
            font-size: 16px; border-radius: 12px; border: none;
            background: #007bff; color: white; font-weight: bold;
        }
        
        #status { margin: 15px; font-size: 16px; color: #00ff00; height: 20px; }
        #debugCanvas { width: 100%; max-width: 400px; background: white; margin-top: 10px; display: block; margin-left: auto; margin-right: auto; }
    </style>
</head>

<body>

<div id="homePage" class="controls">
    <h1>📦 Smart Inventory</h1>
    <button onclick="startAutoScanner('add')">➕ Auto-Add Item</button><br>
    <button onclick="startAutoScanner('take')" style="background: #444;">➖ Auto-Take Item</button>
</div>

<div id="scanPage" class="hidden">
    <div id="status">Scanning for Part Number...</div>
    
    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>

    <div class="controls">
        <button onclick="location.reload()" style="background: #dc3545;">❌ Stop Scanner</button>
    </div>

    <div style="font-size: 11px; color: #777;">OCR PREVIEW:</div>
    <canvas id="debugCanvas"></canvas>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};
let isProcessing = false; // Prevents overlapping OCR scans
let scanInterval;

async function startAutoScanner(m) {
    mode = m;
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");
    
    try {
        await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, aspectRatio: 1.0 },
            () => {}, () => {}
        );

        // Start the auto-detection loop (Every 1 second)
        scanInterval = setInterval(autoCapture, 1000);

    } catch (err) {
        alert("Camera error: " + err);
    }
}

async function autoCapture() {
    if (isProcessing) return; // Don't start a new scan if one is running
    
    const video = document.querySelector("#reader video");
    if (!video || video.readyState !== 4) return;

    isProcessing = true;
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");

    // Dynamic Crop based on video feed
    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const cropW = vW * 0.8;
    const cropH = vH * 0.15;
    const startX = (vW - cropW) / 2;
    const startY = (vH - cropH) / 2;

    canvas.width = 600;
    canvas.height = 120;
    ctx.filter = 'grayscale(1) contrast(2) brightness(1.1)';
    ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, canvas.width, canvas.height);

    canvas.toBlob(async (blob) => {
        try {
            const result = await Tesseract.recognize(blob, 'eng', {
                tessedit_pageseg_mode: 7,
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
            });

            const pn = extractPN(result.data.text);

            if (pn && pn.length >= 4) { // Only trigger if it finds a "real" looking part number
                clearInterval(scanInterval); // Stop scanning immediately
                handleMatch(pn);
            } else {
                isProcessing = false; // Allow next scan
            }
        } catch (e) {
            isProcessing = false;
        }
    }, "image/jpeg");
}

function extractPN(text) {
    const matches = text.trim().match(/[A-Z0-9-]{4,}/g);
    return matches ? matches.reduce((a, b) => a.length > b.length ? a : b) : null;
}

function handleMatch(pn) {
    // Visual feedback
    document.getElementById("status").innerText = "MATCH FOUND: " + pn;
    document.getElementById("scanner-overlay").style.borderColor = "#ffff00";

    // Play a beep if you want here
    setTimeout(() => {
        if (inventory[pn]) {
            let qty = prompt(`Found P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`, "1");
            if (qty) {
                inventory[pn].qty += (mode === "add" ? 1 : -1) * parseInt(qty);
                save();
            }
        } else if (mode === "add") {
            let desc = prompt(`New Part Detected: ${pn}\nEnter Description:`, "Component");
            if (desc) {
                inventory[pn] = { desc: desc, qty: 1 };
                save();
            }
        } else {
            alert("Part not in inventory.");
        }
        
        // Restart scanner after prompt is closed
        isProcessing = false;
        scanInterval = setInterval(autoCapture, 1000);
        document.getElementById("scanner-overlay").style.borderColor = "#00ff00";
        document.getElementById("status").innerText = "Scanning for Part Number...";
    }, 100);
}

function save() {
    localStorage.setItem("full_inv", JSON.stringify(inventory));
}

</script>
</body>
</html>
