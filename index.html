<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXWAH / Auto-Triage Inventory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --surface: #ffffff; --surface2: #f7f8fa; --border: #e2e6ed; --accent: #1a56db;
      --text: #111827; --muted: #6b7280; --success: #0a7a3e; --error: #b91c1c; --mono: 'IBM Plex Mono', monospace;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 40px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 650px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .video-wrap { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 4/3; margin-bottom: 15px; border: 2px solid var(--border); }
    video { width: 100%; height: 100%; object-fit: cover; }
    .field { margin-bottom: 15px; }
    .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
    .field input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 15px; outline: none; background: var(--surface2); }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; font-size: 14px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .status-bar { padding: 12px; border-radius: 8px; font-size: 13px; font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); min-height: 48px; margin-bottom: 15px; display: flex; align-items: center; }
    .status-bar.ok { color: var(--success); background: #ecfdf5; border-color: #a7f3d0; }
    .status-bar.err { color: var(--error); background: #fef2f2; border-color: #fecaca; }
    #fallback-ui { display: none; padding: 15px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 10px; margin: 15px 0; }
    .candidate-btn { background: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-top: 8px; display: block; width: 100%; text-align: left; font-family: var(--mono); font-weight: 600; cursor: pointer; color: var(--accent); }
    .candidate-btn:hover { background: var(--accent); color: #fff; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div style="font-family: var(--mono); font-weight: bold; color: var(--accent); margin-bottom: 20px; display: flex; justify-content: space-between;">
    <span>NEXWAH // TRIAGE V3</span>
    <select id="scanMode" style="font-size: 10px; border: none; background: none; cursor: pointer;">
      <option value="Add">MODE: ADD</option>
      <option value="Take">MODE: TAKE</option>
    </select>
  </div>
  
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
  </div>
  
  <button class="btn btn-primary" onclick="startCamera()">START CAMERA</button>
  <button class="btn btn-primary" style="background:#059669" onclick="captureAndProcess()">⚡ SCAN & AUTO-RESOLVE</button>

  <div id="status" class="status-bar">System Ready...</div>

  <div id="fallback-ui">
    <label style="font-size: 11px; font-weight: bold; color: #92400e;">⚠️ AUTO-DETECT FAIL: CHOOSE THE MFR PN</label>
    <div id="candidate-list"></div>
  </div>

  <div class="field">
    <label>Manufacturer Part Number</label>
    <input type="text" id="finalPn" placeholder="Scanning result..." readonly>
  </div>
  <div class="field">
    <label>Web-Sourced Description</label>
    <input type="text" id="finalDesc" placeholder="Search result..." readonly>
  </div>
  <input type="hidden" id="scanQty" value="1">
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
// --- CONFIG (DO NOT CHANGE) ---
const GOOGLE_API_KEY = "AIzaSyBjzZf1DVzZFuaf9tC5SW8x9bjqp1t7HQQ";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYSqnfI-_n4HObZyrtypdkioVlKIHXUZfqDAYT5mgJ6nWnBU2pfL4EQg_NCqz8w6Gi/exec";

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
  document.getElementById("video").srcObject = stream;
}

// 🧽 STEP 3: THE SNIPER (Slices MFR, INV, SO, and Dates)
function filterAndStrip(text) {
  let lines = text.split('\n').map(l => l.toUpperCase().trim());
  let results = [];
  const blockList = ["INV", "S/O", "DATE", "LOT", "QTY", "SHIP", "CUST", "ORDER", "PACK", "BILL", "REF", "ADVICE"];

  for (let line of lines) {
    if (/(\d{2,4}[\/\-\.]\d{2,4}[\/\-\.]\d{2,4})/.test(line)) continue;
    if (blockList.some(bad => line.includes(bad))) continue;

    // Remove Labels & Stuck prefixes (MFRRK73Z -> RK73Z)
    let clean = line.replace(/[:;,\(\)\[\]\s]/g, "")
                    .replace(/^MFR/, "").replace(/^MFG/, "").replace(/^MPN/, "")
                    .replace(/^MAN/, "").replace(/^PN/, "").replace(/^PART/, "")
                    .replace(/^P\/N/, "").replace(/^\(P\)/, "");

    if (clean.length >= 6 && clean.length <= 25 && /[A-Z]/.test(clean) && /[0-9]/.test(clean)) {
      if (!clean.endsWith("-ND")) results.push(clean);
    }
  }
  return [...new Set(results)];
}

// ⭐ STEP 4: SCORING
function getTopCandidates(lines) {
  return lines.map(l => {
    let s = 20;
    if (/^(SN|GRM|BZT|MAX|LM|AT|CC|RK|ERJ|RC|511|BSS|TPS|ADM)/.test(l)) s += 100;
    if (l.includes("-")) s += 10;
    if (/^[0-9]/.test(l)) s -= 30;
    return { val: l, score: s };
  }).sort((a,b) => b.score - a.score).slice(0, 3).map(c => c.val);
}

// 🔁 STEP 5 & 9: AUTO-FLOW
async function captureAndProcess() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  
  const base64 = canvas.toDataURL("image/jpeg", 0.8).split(',')[1];
  document.getElementById("fallback-ui").style.display = "none";
  updateStatus('<span class="spinner"></span>Extracting Text...', "loading");

  try {
    const gResp = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`, {
      method: "POST",
      body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: "TEXT_DETECTION" }] }] })
    });
    const gData = await gResp.json();
    const rawText = gData.responses[0].textAnnotations[0].description;

    const candidates = getTopCandidates(filterAndStrip(rawText));
    if(candidates.length === 0) throw new Error("No MFR PN detected");

    updateStatus('<span class="spinner"></span>Searching Web/Sheet...', "loading");
    
    // 🔥 AUTO-LOOP (Case A)
    for(let pn of candidates) {
      const lookup = await fetch(`${SCRIPT_URL}?action=lookup&pn=${pn}`);
      const info = await lookup.json();
      
      // If found in sheet or found on web with a real description
      if(info.found && info.desc !== "Electronic Component") {
        await autoSync(pn, info.desc);
        return; 
      }
    }

    // 🔴 FALLBACK (Case B)
    showFallback(candidates);

  } catch(e) { updateStatus("❌ " + e.message, "err"); }
}

async function autoSync(pn, desc) {
  updateStatus('<span class="spinner"></span>Uploading to Sheet...', "loading");
  const rowData = [new Date().toLocaleString("en-GB"), pn, desc, 1, document.getElementById("scanMode").value];

  await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(rowData) });

  document.getElementById("finalPn").value = pn;
  document.getElementById("finalDesc").value = desc;
  updateStatus("🟢 SUCCESS: Synced " + pn, "ok");
}

function showFallback(candidates) {
  updateStatus("⚠️ Multiple options detected", "err");
  const ui = document.getElementById("fallback-ui");
  const list = document.getElementById("candidate-list");
  ui.style.display = "block";
  list.innerHTML = "";
  
  candidates.forEach(pn => {
    const btn = document.createElement("button");
    btn.className = "candidate-btn";
    btn.innerText = pn;
    btn.onclick = async () => {
      const lookup = await fetch(`${SCRIPT_URL}?action=lookup&pn=${pn}`);
      const info = await lookup.json();
      autoSync(pn, info.desc || "Manual Component");
    };
    list.appendChild(btn);
  });
}

function updateStatus(m, c) {
  const s = document.getElementById("status");
  s.innerHTML = m;
  s.className = "status-bar " + c;
}
</script>
</body>
</html>
