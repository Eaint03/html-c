<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 Industrial P/N Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: white; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        button { padding: 18px; margin: 10px 0; font-size: 16px; cursor: pointer; border-radius: 12px; width: 90%; border: none; font-weight: bold; }
        .btn-main { background: #007bff; color: white; }
        .hidden { display: none; }
        
        #scanner-wrapper { 
            width: 100%; height: 380px; margin: 15px 0; background: #000; 
            border: 3px solid #444; border-radius: 20px; overflow: hidden; position: relative;
        }

        /* Target Overlays */
        .laser { position: absolute; top: 50%; left: 10%; width: 80%; height: 2px; background: red; box-shadow: 0 0 8px red; z-index: 10; }
        .overlay-dim {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 5;
            clip-path: polygon(0% 0%, 0% 100%, 5% 100%, 5% 42%, 95% 42%, 95% 58%, 5% 58%, 5% 100%, 100% 100%, 100% 0%);
        }
        
        .shutter-btn { background: white; border: 8px solid #555; width: 85px; height: 85px; border-radius: 50%; margin: 10px auto; cursor: pointer; }
        .shutter-btn:active { background: #007bff; }
        
        #status { font-size: 16px; font-weight: bold; margin: 10px; color: #007bff; height: 24px; }
        .item-card { border: 1px solid #333; padding: 15px; margin-top: 10px; background: #222; border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="homePage">
        <h2>📦 Smart Inventory</h2>
        <button class="btn-main" onclick="openScanner('add')">➕ SCAN TO ADD</button>
        <button class="btn-main" onclick="openScanner('take')" style="background:#fd7e14;">➖ SCAN TO TAKE</button>
        <button class="btn-main" onclick="showInventory()" style="background:#6c757d;">📋 VIEW LIST</button>
    </div>

    <div id="scanPage" class="hidden">
        <div id="status">READY TO SCAN</div>
        
        <div id="scanner-wrapper">
            <div class="overlay-dim"></div>
            <div class="laser"></div>
            <div id="reader" style="width: 100%;"></div>
        </div>

        <div class="shutter-btn" onclick="captureAndProcess()"></div>
        <p><b>ALIGNS P/N TO RED LINE & TAP</b></p>
        
        <button onclick="location.reload()" style="background:none; color:#777; border:none; text-decoration:underline;">Cancel</button>
    </div>

    <div id="inventoryBox"></div>
</div>

<script>
let mode = "";
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};
let html5QrCode;

function openScanner(m) {
    mode = m;
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");
    
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 10, // Slower FPS for better camera stability
        qrbox: { width: 350, height: 100 },
        videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
    };
    
    // Start camera but disable the auto-detection engine
    html5QrCode.start({ facingMode: "environment" }, config, () => {}).catch(err => alert(err));
}

async function captureAndProcess() {
    const status = document.getElementById("status");
    status.innerText = "⌛ CAPTURING PHOTO...";
    status.style.color = "yellow";

    try {
        // 1. Take a high-quality photo
        const imageFile = await html5QrCode.takePhoto();
        
        status.innerText = "🔍 ANALYZING LINES...";
        
        // 2. Run the heavy decoding math on the still image
        const result = await html5QrCode.scanFile(imageFile, true);
        
        if (navigator.vibrate) navigator.vibrate(100);
        processData(result);
    } catch (err) {
        status.innerText = "❌ FAILED. TRY MOVING BACK.";
        status.style.color = "#ff4444";
        console.error(err);
    }
}

function processData(text) {
    let pn = text.trim();
    // Clean DigiKey/Mouser Prefixes
    if (pn.startsWith("1P")) pn = pn.substring(2);
    else if (pn.startsWith("P")) pn = pn.substring(1);

    html5QrCode.stop().then(() => {
        if (inventory[pn]) {
            let qty = prompt(`Update P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nAmount to ${mode}:`, "1");
            if (qty) inventory[pn].qty += (mode === 'add' ? parseInt(qty) : -parseInt(qty));
        } else {
            if (mode === 'add') {
                let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");
                inventory[pn] = { desc: desc || "No Desc", qty: 1 };
            } else {
                alert("Part not found in inventory.");
            }
        }
        localStorage.setItem("full_inv", JSON.stringify(inventory));
        location.reload();
    });
}

function showInventory() {
    let html = "<h3>📋 Stock</h3>";
    for (let pn in inventory) {
        html += `<div class="item-card"><b>P/N: ${pn}</b><br><small>${inventory[pn].desc}</small><br>Qty: ${inventory[pn].qty}</div>`;
    }
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>
</body>
</html>
