<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>
</head>

<body>

<h2>Smart Inventory System</h2>

<input type="file" id="imageInput">
<button onclick="processImage()">Scan & Save</button>

<script>

async function processImage() {
    let file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Upload image first");
        return;
    }

    let reader = new FileReader();

    reader.onload = async function() {

        let base64 = reader.result.split(',')[1];

        let response = await fetch(
            "https://vision.googleapis.com/v1/images:annotate?key=AIzaSyD_IJCoucQxNSnuC8zckz8cnq8emjYc_oM",
            {
                method: "POST",
                body: JSON.stringify({
                    requests: [
                        {
                            image: { content: base64 },
                            features: [{ type: "TEXT_DETECTION" }]
                        }
                    ]
                })
            }
        );

        let result = await response.json();

        let text = result.responses[0].fullTextAnnotation.text;

        console.log(text);

        // 🔍 Extract
        let component = "";
        let quantity = 1;

        let descMatch = text.match(/Desc[:\s]*(.*)/i);
        if (descMatch) component = descMatch[1];

        let qtyMatch = text.match(/Quantity[:\s]*(\d+)/i);
        if (qtyMatch) quantity = parseInt(qtyMatch[1]);

        // 💾 Save to Google Sheet
        await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
            method: "POST",
            body: JSON.stringify({
                component: component,
                quantity: quantity,
                location: ""
            })
        });

        alert("Saved!\n" + component + "\nQty: " + quantity);
    };

    reader.readAsDataURL(file);
}

</script>

</body>
</html>
