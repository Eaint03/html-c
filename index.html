<!DOCTYPE html>
<html>
<head>
    <title>Precision Inventory OCR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .hidden { display: none; }
        
        /* Container for the scanner */
        #reader-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: auto;
            border-radius: 12px;
            overflow: hidden;
        }

        /* The Red Targeting Box */
        #scanner-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60px; /* Narrow focus area */
            border: 2px solid #ff4444;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.5); /* Dims the outside area */
            z-index: 10;
            pointer-events: none;
        }

        button {
            padding: 15px; margin: 10px; width: 80%; max-width: 300px;
            font-size: 16px; border-radius: 12px; border: none;
            background: #007bff; color: white; font-weight: bold;
        }
        
        #status { margin: 15px; font-size: 18px; color: #ffcc00; }
        
        #debugCanvas { 
            width: 100%; max-width: 400px; 
            background: white; border: 1px solid #555; margin-top: 10px;
        }
    </style>
</head>

<body>

<div id="homePage">
    <h1>📦 Smart Inventory</h1>
    <button onclick="openScanner('add')">➕ Add / Restock</button>
    <button onclick="openScanner('take')" style="background: #444;">➖ Remove / Take</button>
</div>

<div id="scanPage" class="hidden">
    <h2>Align Part Number</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>

    <p id="status">Place P/N inside the red box</p>
    
    <button onclick="captureAndProcess()">📸 CAPTURE</button>
    <button onclick="stopScanner()" style="background: #dc3545;">❌ CANCEL</button>
    
    <div style="font-size: 12px; color: #aaa; margin-top: 20px;">OCR SIGHT:</div>
    <canvas id="debugCanvas"></canvas>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

async function openScanner(m) {
    mode = m;
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");
    
    try {
        await html5QrCode.start(
            { facingMode: "environment" },
            { fps: 10, aspectRatio: 1.0 },
            () => {}, () => {}
        );
    } catch (err) {
        alert("Camera error: " + err);
    }
}

function preprocessImage(blob) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(blob);
        img.onload = () => {
            const canvas = document.getElementById("debugCanvas");
            const ctx = canvas.getContext("2d");

            // --- THE PRECISION CROP LOGIC ---
            // We only capture the horizontal center strip (matches the red box)
            const cropWidth = img.width * 0.8;
            const cropHeight = img.height * 0.15; // Only 15% of the total image height
            const startX = (img.width - cropWidth) / 2;
            const startY = (img.height - cropHeight) / 2;

            canvas.width = 800;  // High resolution for Tesseract
            canvas.height = 150;

            // Apply sharpening and contrast filters
            ctx.filter = 'grayscale(1) contrast(2) brightness(1.2)';
            
            ctx.drawImage(
                img, 
                startX, startY, cropWidth, cropHeight, // Source
                0, 0, canvas.width, canvas.height      // Destination
            );

            canvas.toBlob(resolve, "image/jpeg", 1.0);
        };
    });
}

async function captureAndProcess() {
    const status = document.getElementById("status");
    try {
        status.innerText = "📸 Capturing...";
        const rawBlob = await html5QrCode.takePhoto();
        
        status.innerText = "⚙️ Cropping & Filtering...";
        const processedBlob = await preprocessImage(rawBlob);

        status.innerText = "🧠 Reading...";
        const result = await Tesseract.recognize(
            processedBlob,
            'eng',
            { 
                tessedit_pageseg_mode: 7, // Mode 7: Treat as a single line
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-' 
            }
        );

        const pn = extractPN(result.data.text);

        if (!pn) {
            status.innerHTML = "❌ Failed to detect P/N";
        } else {
            status.innerHTML = "✅ Found: " + pn;
            setTimeout(() => processData(pn), 600);
        }

    } catch (err) {
        status.innerText = "❌ Error: " + err;
    }
}

function extractPN(text) {
    // Cleans up OCR artifacts and finds the longest alphanumeric string
    const matches = text.trim().match(/[A-Z0-9-]{3,}/g);
    return matches ? matches.reduce((a, b) => a.length > b.length ? a : b) : null;
}

function processData(pn) {
    if (inventory[pn]) {
        let change = prompt(`P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`, "1");
        if (change) {
            inventory[pn].qty += (mode === "add" ? 1 : -1) * parseInt(change);
            saveAndReload();
        }
    } else if (mode === "add") {
        let desc = prompt(`New Part: ${pn}\nDescription:`, "Component");
        if (desc) {
            inventory[pn] = { desc: desc, qty: 1 };
            saveAndReload();
        }
    } else {
        alert("Part not found!");
    }
}

function saveAndReload() {
    localStorage.setItem("full_inv", JSON.stringify(inventory));
    location.reload();
}

function stopScanner() {
    location.reload();
}
</script>

</body>
</html>
