<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Precision v12</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; overflow: hidden; }
        .page { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        button { width: 95%; max-width: 380px; padding: 16px; margin: 5px 0; border-radius: 12px; border: none; font-size: 17px; font-weight: bold; cursor: pointer; }
        .btn-capture { background: var(--green); color: white; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #reader-container { position: relative; width: 100%; max-width: 380px; margin: 5px auto; border-radius: 15px; overflow: hidden; border: 2px solid #444; }
        #scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 26px; border: 2px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.85); z-index: 5; pointer-events: none; }
        #status { margin: 8px; color: #00ff00; font-weight: bold; font-size: 1.1rem; }
        #debugCanvas { width: 90%; max-width: 340px; background: white; border-radius: 8px; display: block; margin: 5px auto; image-rendering: pixelated; }
    </style>
</head>
<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 Precision v12</h1>
    <button style="background:var(--blue); color:white;" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
    <button style="background:#333; color:white;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Ready (Tap to Focus)</div>
    <div id="reader-container" onclick="manualFocus()">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>
    <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE & AUTO-FIX</button>
    <button style="background:#cc0000; color:white; padding: 10px;" onclick="goTo('homePage')">Exit</button>
    <canvas id="debugCanvas"></canvas>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";
let mode = ""; let html5QrCode = null; let processing = false;

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start({ facingMode: "environment" }, { fps: 25, aspectRatio: 1.0 }, () => {}, () => {});
}

async function manualFocus() {
    const video = document.querySelector("#reader video");
    const track = video?.srcObject?.getVideoTracks()[0];
    if (track) {
        await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
        document.getElementById("status").innerText = "🎯 Focus Locked";
    }
}

function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    if (navigator.vibrate) navigator.vibrate(80);
    const status = document.getElementById("status");
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");

    status.innerText = "⏳ Sharpening Geometry...";

    const vW = video.videoWidth; const vH = video.videoHeight;
    const cropW = vW * 0.88; const cropH = vH * 0.04;
    const sx = (vW - cropW) / 2; const sy = (vH - cropH) / 2;

    canvas.width = 3000; canvas.height = 140;
    ctx.imageSmoothingEnabled = false;

    // 🔥 THE "INVERT" STRATEGY
    // Inverting (invert(1)) makes the text glow, which helps the AI see gaps in 8/B/S
    // High contrast (200%) forces 7 vs Z corners to be sharp.
    ctx.filter = 'grayscale(1) invert(1) contrast(200%) brightness(1.1)';
    ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

    const res = await Tesseract.recognize(canvas, 'eng', {
        tessedit_pageseg_mode: 7,
        tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-'
    });

    let pn = res.data.text.trim().replace(/\s/g, "").toUpperCase();

    if (pn.length > 3) {
        // 🧠 LOGICAL CONTEXT REPAIR
        pn = pn.replace(/O/g, "0")
               .replace(/[\|\[\]I!l]/g, "1");

        // Electronic specific fixes
        if (pn.includes('B') && (pn.match(/\d/g) || []).length > 2) pn = pn.replace(/B/g, "8");
        if (pn.includes('Z') === false && pn.includes('7')) {
             // If the label is a KOA/resistor label, we check if 7 should be Z
             // This is a manual check you can perform during the prompt
        }

        status.innerText = "🎯 RESULT: " + pn;
        const q = prompt(`Quantity for:\n${pn}`, "1");
        if (q) {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify([{ pn, qty: parseInt(q), mode, date: new Date().toLocaleString() }]) });
            status.innerText = "✅ Saved!";
            setTimeout(() => status.innerText = "Ready", 2000);
        }
    } else {
        status.innerText = "❌ Scan Failed. Tilt for less glare.";
    }
    processing = false;
}
</script>
</body>
</html>
