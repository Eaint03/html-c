<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Inventory - Ultra Accuracy</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
:root { --blue: #007bff; --green: #28a745; --dark: #121212; }
body { font-family: sans-serif; background: var(--dark); color: white; text-align: center; }

.page { padding: 20px; display: flex; flex-direction: column; align-items: center; }
.hidden { display: none !important; }

button {
    width: 95%; max-width: 380px; padding: 20px;
    margin: 10px 0; border-radius: 15px;
    font-size: 18px; font-weight: bold;
}

.btn-main { background: var(--blue); color: white; }
.btn-capture { background: var(--green); font-size: 24px; }

#reader-container {
    position: relative;
    width: 100%;
    max-width: 400px;
    border-radius: 20px;
    overflow: hidden;
}

#scanner-overlay {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    height: 35px;
    border: 3px solid #00ff00;
    box-shadow: 0 0 0 1000px rgba(0,0,0,0.85);
}

#debugCanvas {
    width: 95%;
    max-width: 380px;
    background: white;
    margin-top: 10px;
}
</style>
</head>

<body>

<div id="homePage" class="page">
    <h1>📦 Ultra Scan</h1>
    <button class="btn-main" onclick="goTo('scanPage', 'add')">Add</button>
    <button class="btn-main" onclick="goTo('scanPage', 'take')">Remove</button>
</div>

<div id="scanPage" class="page hidden">
    <h2>Scanning...</h2>
    <div id="status">Ready</div>

    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>

    <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE</button>
    <canvas id="debugCanvas"></canvas>
</div>

<script>
let html5QrCode;
let processing = false;
let mode = "";

// =========================
// NAVIGATION
// =========================
function goTo(page, m="") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(page).classList.remove('hidden');
    mode = m;
    initScanner();
}

// =========================
// CAMERA (UNCHANGED)
// =========================
async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start(
        { facingMode: "environment" },
        { fps: 25 },
        () => {}
    );
}

// =========================
// 🔥 IMPROVED OCR FUNCTION
// =========================
async function captureAndScan() {

    if (processing) return;
    processing = true;

    const video = document.querySelector("#reader video");
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");
    const status = document.getElementById("status");

    // =========================
    // ⚡ YOUR ORIGINAL CAPTURE (UNCHANGED)
    // =========================
    const vW = video.videoWidth;
    const vH = video.videoHeight;

    const cropW = vW * 0.88;
    const cropH = vH * 0.07;

    const sx = (vW - cropW) / 2;
    const sy = (vH - cropH) / 2;

    // 🔥 ONLY CHANGE: higher resolution
    canvas.width = 3000;
    canvas.height = 300;

    // 🔥 IMPROVED FILTER (NOT TOO HARSH)
    ctx.filter = 'grayscale(1) contrast(6) brightness(1.3)';
    ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

    status.innerText = "Reading...";

    try {

        const res = await Tesseract.recognize(canvas, 'eng', {
            tessedit_pageseg_mode: 7,
            tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-.,'
        });

        // =========================
        // 🔥 CHARACTER-LEVEL REBUILD
        // =========================
        let text = "";

        res.data.symbols.forEach(sym => {
            if (sym.confidence > 60) {
                text += sym.text;
            }
        });

        let pn = text.replace(/\s/g, "");

        // =========================
        // RESULT
        // =========================
        if (pn.length > 5) {
            status.innerText = "🎯 " + pn;
        } else {
            status.innerText = "❌ Not clear";
        }

    } catch (e) {
        status.innerText = "Error";
    }

    processing = false;
}
</script>

</body>
</html>
