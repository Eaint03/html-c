<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 350px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        #cameraPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 10;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .capture-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            border: 6px solid #ccc;
            z-index: 9999;
        }

        .capture-btn::after {
            content: '';
            width: 65px;
            height: 65px;
            background: #4CAF50;
            display: block;
            border-radius: 50%;
            margin: auto;
            margin-top: 6px;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            z-index: 9999;
        }

        .top-bar button {
            width: auto;
            padding: 10px 15px;
            background: rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<h1>Welcome to smart Inventory System</h1>

<!-- HOME -->
<div class="container" id="home">
    <h3>Select Action</h3>
    <button onclick="goToAdd()">➕ Add Inventory</button>
    <button onclick="goToTake()">📤 Take Inventory</button>
</div>

<!-- ADD PAGE -->
<div class="container hidden" id="addPage">
    <h3>➕ Add Inventory</h3>
    <button onclick="openCamera()">📷 Take Photo</button>
    <button onclick="goHome()">Back</button>
</div>

<!-- CAMERA -->
<div id="cameraPage" class="hidden">
    <video id="camera" autoplay playsinline></video>

    <div class="top-bar">
        <button onclick="closeCamera()">Back</button>
    </div>

    <button class="capture-btn" onclick="takePhoto()" type="button"></button>
</div>

<!-- TAKE PAGE -->
<div class="container hidden" id="takePage">
    <h3>📤 Take Inventory</h3>
    <button onclick="goHome()">Back</button>
</div>

<script>

let video = document.getElementById("camera");
let stream = null;

// NAVIGATION
function goToAdd() {
    home.classList.add("hidden");
    addPage.classList.remove("hidden");
}

function goToTake() {
    home.classList.add("hidden");
    takePage.classList.remove("hidden");
}

function goHome() {
    home.classList.remove("hidden");
    addPage.classList.add("hidden");
    takePage.classList.add("hidden");
}

// CAMERA
async function openCamera() {
    document.getElementById("cameraPage").classList.remove("hidden");

    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
    } catch {
        stream = await navigator.mediaDevices.getUserMedia({ video: true });
    }

    video.srcObject = stream;
}

function closeCamera() {
    document.getElementById("cameraPage").classList.add("hidden");

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
}

// TAKE PHOTO
function takePhoto() {

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    processImage(canvas);
}

// OCR + SMART EXTRACTION
function processImage(canvas) {

    canvas.toBlob(async function(blob) {

        let reader = new FileReader();

        reader.onload = async function() {

            let base64 = reader.result.split(',')[1];

            let response = await fetch(
                "https://vision.googleapis.com/v1/images:annotate?key=AIzaSyD_IJCoucQxNSnuC8zckz8cnq8emjYc_oM",
                {
                    method: "POST",
                    body: JSON.stringify({
                        requests: [{
                            image: { content: base64 },
                            features: [{ type: "DOCUMENT_TEXT_DETECTION" }]
                        }]
                    })
                }
            );

            let result = await response.json();

            if (!result.responses || !result.responses[0].fullTextAnnotation) {
                alert("❌ No text detected");
                return;
            }

            let text = result.responses[0].fullTextAnnotation.text;
            console.log(text);

            let lines = text.split("\n");

            let component = "";
            let quantity = "";
            let location = "";

            lines.forEach(line => {

                let upper = line.toUpperCase();

                // COMPONENT
                if (upper.includes("WIRE") || upper.includes("RESISTOR") || upper.includes("CAPACITOR") || upper.includes("IC")) {
                    component = line.trim();
                }

                // QUANTITY
                let qtyMatch = line.match(/\b\d{2,5}\b/);
                if (qtyMatch && !quantity) {
                    quantity = qtyMatch[0];
                }

                // LOCATION (PB51-09 type)
                let locMatch = line.match(/[A-Z]{2,3}\d{2}[-]?\d{2}/);
                if (locMatch) {
                    location = locMatch[0];
                }

            });

            // VALIDATION
            if (!component || !quantity) {
                alert("⚠️ Detection not accurate. Please retake photo.");
                return;
            }

            // SAVE
            await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
                method: "POST",
                body: JSON.stringify({
                    component: component,
                    quantity: quantity,
                    location: location
                })
            });

            alert(`✅ Saved!\nComponent: ${component}\nQty: ${quantity}\nLocation: ${location}`);
        };

        reader.readAsDataURL(blob);

    }, "image/jpeg");
}

</script>

</body>
</html>
