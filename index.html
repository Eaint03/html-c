<script>
    // --- CONFIGURATION ---
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec";
    
    let mode = "";
    let html5QrCode = null;
    let scanTimer = null;
    let processing = false;
    let pendingList = JSON.parse(localStorage.getItem("inv_pending")) || [];

    // --- STABILIZER VARIABLES ---
    let lastResult = "";
    let resultCount = 0;

    function goTo(pageId, m = "") {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');

        if (pageId === 'scanPage') {
            mode = m;
            document.getElementById('modeTitle').innerText = (m === 'add' ? "Add Stock" : "Remove Stock");
            initScanner();
        } else {
            killScanner();
            if (pageId === 'reviewPage') renderTable();
            if (pageId === 'homePage') updateBadge();
        }
    }

    async function initScanner() {
        html5QrCode = new Html5Qrcode("reader");
        try {
            // Increased FPS to 15 for smoother capture
            await html5QrCode.start({ facingMode: "environment" }, { fps: 15, aspectRatio: 1.0 }, () => {}, () => {});
            document.getElementById("status").innerText = "Align Part Number in Box...";
            // Check every 800ms for a balance of speed and stability
            scanTimer = setInterval(takeStep, 800);
        } catch (e) { alert(e); }
    }

    function killScanner() {
        clearInterval(scanTimer);
        if (html5QrCode) html5QrCode.stop().catch(() => {});
        lastResult = ""; 
        resultCount = 0;
    }

    async function takeStep() {
        if (processing) return;
        const video = document.querySelector("#reader video");
        if (!video || video.readyState < 2) return;

        processing = true;
        const canvas = document.getElementById("debugCanvas");
        const ctx = canvas.getContext("2d");

        const vW = video.videoWidth; const vH = video.videoHeight;
        const cropW = vW * 0.8; const cropH = vH * 0.15; // Tighter height to reduce noise
        const sx = (vW - cropW) / 2; const sy = (vH - cropH) / 2;

        // Upscale slightly for better OCR clarity
        canvas.width = 800; canvas.height = 150;
        ctx.filter = 'grayscale(1) contrast(2.5) brightness(1.1)';
        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(async (blob) => {
            try {
                const res = await Tesseract.recognize(blob, 'eng', { 
                    tessedit_pageseg_mode: 7,
                    tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-' // Ignore symbols/lowercase
                });

                const text = res.data.text.trim().replace(/\s/g, "");
                const found = text.match(/[A-Z0-9-]{4,}/g);
                const confidence = res.data.confidence;

                if (found && confidence > 65) {
                    const pn = found.reduce((a, b) => a.length > b.length ? a : b);
                    
                    // --- STABILITY CHECK ---
                    if (pn === lastResult) {
                        resultCount++;
                    } else {
                        lastResult = pn;
                        resultCount = 0;
                    }

                    // If we see the same PN twice, confirm it
                    if (resultCount >= 1) {
                        document.getElementById("status").innerText = "✅ CONFIRMED: " + pn;
                        if (navigator.vibrate) navigator.vibrate(50);
                        
                        // Small pause to let user see the green status before prompt
                        setTimeout(() => {
                            const q = prompt(`Part: ${pn}\nQuantity:`, "1");
                            if (q) {
                                pendingList.push({ pn: pn, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() });
                                localStorage.setItem("inv_pending", JSON.stringify(pendingList));
                            }
                            lastResult = ""; resultCount = 0; processing = false;
                        }, 200);
                        return;
                    } else {
                        document.getElementById("status").innerText = "🔍 Checking... " + pn;
                    }
                } else {
                    document.getElementById("status").innerText = "Searching...";
                    lastResult = ""; resultCount = 0;
                }
            } catch (e) { console.error(e); }
            processing = false;
        }, "image/jpeg", 0.8);
    }

    function renderTable() {
        const tbody = document.getElementById("reviewList");
        tbody.innerHTML = "";
        pendingList.forEach((item, i) => {
            tbody.innerHTML += `<tr>
                <td>${item.pn}</td>
                <td>${item.qty}</td>
                <td style="color:${item.mode=='add'?'#28a745':'#dc3545'}">${item.mode.toUpperCase()}</td>
                <td class="del-btn" onclick="removeItem(${i})">✕</td>
            </tr>`;
        });
        document.getElementById("syncBtn").style.display = pendingList.length ? "block" : "none";
    }

    function removeItem(i) {
        pendingList.splice(i, 1);
        localStorage.setItem("inv_pending", JSON.stringify(pendingList));
        renderTable();
    }

    async function syncData() {
        if (pendingList.length === 0) return;
        const btn = document.getElementById("syncBtn");
        btn.innerText = "⏳ Syncing..."; btn.disabled = true;

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(pendingList) });
            alert("Success! Google Sheets updated.");
            pendingList = [];
            localStorage.setItem("inv_pending", JSON.stringify(pendingList));
            goTo('homePage');
        } catch (e) { alert("Sync Error - check connection"); }
        btn.innerText = "🚀 Sync to Google Sheets"; btn.disabled = false;
    }

    function updateBadge() { 
        document.getElementById("countBadge").innerText = pendingList.length; 
    }
    updateBadge();
</script>
