<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory - Ultra Accuracy</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        button { 
            width: 95%; max-width: 380px; padding: 20px; margin: 10px 0; 
            border-radius: 15px; border: none; font-size: 18px; font-weight: bold; 
            cursor: pointer; 
        }
        .btn-main { background: var(--blue); color: white; }
        .btn-capture { 
            background: var(--green); color: white; font-size: 24px; 
            border: 4px solid white; box-shadow: 0 0 20px rgba(40, 167, 69, 0.6);
        }
        
        #reader-container { 
            position: relative; width: 100%; max-width: 400px; 
            margin: 10px auto; border-radius: 20px; overflow: hidden; border: 3px solid #444;
        }
        /* Very narrow box to force the user to align perfectly */
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 35px; border: 3px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.85); z-index: 5; pointer-events: none;
        }

        #status { margin: 15px; color: #00ff00; font-weight: bold; font-size: 1.3rem; min-height: 35px; }
        #debugCanvas { width: 95%; max-width: 380px; background: white; border-radius: 10px; display: block; margin: 10px auto; border: 2px solid #555; }
    </style>
</head>
<body>

    <div id="homePage" class="page">
        <h1 style="margin-top: 40px;">📦 Ultra-Precision Scan</h1>
        <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
        <button class="btn-main" style="background:#333;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
    </div>

    <div id="scanPage" class="page hidden">
        <h2 id="modeTitle">Scanning...</h2>
        <div id="status">Ready</div>

        <div id="reader-container">
            <div id="reader"></div>
            <div id="scanner-overlay"></div>
        </div>

        <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE & SAVE</button>
        <button class="btn-main" style="background:#cc0000;" onclick="goTo('homePage')">Exit</button>
        
        <canvas id="debugCanvas"></canvas>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";
        
        let mode = "";
        let html5QrCode = null;
        let processing = false;

        function goTo(pageId, m = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            if (pageId === 'scanPage') { mode = m; initScanner(); } else { killScanner(); }
        }

        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 25, aspectRatio: 1.0 }, () => {}, () => {});
            } catch (e) { alert(e); }
        }

        function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

        // Enhanced image processing function
        async function enhanceImageForOCR(canvas, video) {
            const ctx = canvas.getContext("2d");
            const vW = video.videoWidth;
            const vH = video.videoHeight;
            
            // Capture a larger area (increased from 7% to 20% to capture more text)
            const cropW = vW * 0.88;
            const cropH = vH * 0.20;  // Increased from 0.07 to 0.20
            const sx = (vW - cropW) / 2;
            const sy = (vH - cropH) / 2;
            
            // Higher resolution for better OCR (increased from 1800 to 2400)
            canvas.width = 2400;
            canvas.height = Math.floor(2400 * (cropH / cropW));
            
            // Draw the cropped area with high quality
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = "high";
            ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);
            
            // Get image data for processing
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            
            // Adaptive contrast enhancement (replaced extreme contrast with balanced approach)
            // Calculate image statistics
            let sum = 0;
            for (let i = 0; i < data.length; i += 4) {
                let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                sum += gray;
            }
            let avg = sum / (data.length / 4);
            
            // Find min and max for contrast stretching
            let min = 255, max = 0;
            for (let i = 0; i < data.length; i += 4) {
                let gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                min = Math.min(min, gray);
                max = Math.max(max, gray);
            }
            
            // Apply enhanced preprocessing
            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i+1];
                let b = data[i+2];
                
                // Convert to grayscale with proper weights
                let gray = 0.299 * r + 0.587 * g + 0.114 * b;
                
                // Contrast stretch (better than extreme contrast)
                let stretched = ((gray - min) / (max - min)) * 255;
                
                // Adaptive thresholding simulation
                let threshold = avg * 0.9;
                let binary = stretched > threshold ? 255 : 0;
                
                // Apply slight sharpening
                data[i] = binary;
                data[i+1] = binary;
                data[i+2] = binary;
            }
            ctx.putImageData(imageData, 0, 0);
            
            // Additional sharpening pass using convolution
            const sharpened = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const sharpData = sharpened.data;
            const width = canvas.width;
            const height = canvas.height;
            
            // Simple sharpening kernel
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    let idx = (y * width + x) * 4;
                    let center = sharpData[idx];
                    let left = sharpData[idx - 4];
                    let right = sharpData[idx + 4];
                    let top = sharpData[idx - width * 4];
                    let bottom = sharpData[idx + width * 4];
                    
                    let sharpenedValue = center * 1.5 - (left + right + top + bottom) * 0.125;
                    sharpenedValue = Math.min(255, Math.max(0, sharpenedValue));
                    
                    sharpData[idx] = sharpenedValue;
                    sharpData[idx+1] = sharpenedValue;
                    sharpData[idx+2] = sharpenedValue;
                }
            }
            ctx.putImageData(sharpened, 0, 0);
            
            return canvas;
        }

        // Enhanced text cleaning function
        function cleanOCRText(text) {
            let cleaned = text.trim()
                .replace(/\s+/g, ' ')
                .replace(/\|/g, 'I')
                .replace(/\[/g, 'I')
                .replace(/\]/g, 'I')
                .replace(/\(/g, '')
                .replace(/\)/g, '')
                .replace(/{/g, '')
                .replace(/}/g, '')
                .replace(/O/g, '0')
                .replace(/o/g, '0')
                .replace(/Q/g, '0')
                .replace(/D/g, '0')
                .replace(/S/g, '5')
                .replace(/s/g, '5')
                .replace(/Z/g, '2')
                .replace(/z/g, '2')
                .replace(/G/g, '6')
                .replace(/B/g, '8')
                .replace(/R/g, '')
                .toUpperCase();
            
            // Extract part number patterns
            // Look for common part number formats
            const patterns = [
                /[A-Z0-9]{2,}-\w+-\w+[A-Z0-9-]*/g,  // Like: BZT52H-B18.115CT-ND
                /[A-Z0-9]{2,}-\w+-\w+/g,              // Like: AT25256B-SSHL-B
                /[A-Z]{2,}\d+[A-Z0-9-.]*/g,           // Like: BZT52H-B18
                /\d+[A-Z]+[A-Z0-9-.]*/g,               // Like: 1727-BZT52H
                /[A-Z0-9]{4,}-[A-Z0-9]{2,}/g,          // General pattern
                /[A-Z0-9]{6,}/g                         // Long alphanumeric
            ];
            
            for (let pattern of patterns) {
                let matches = cleaned.match(pattern);
                if (matches && matches.length > 0) {
                    // Return the longest match that looks like a part number
                    let bestMatch = matches.reduce((a, b) => a.length > b.length ? a : b, '');
                    if (bestMatch.length >= 5) {
                        return bestMatch;
                    }
                }
            }
            
            // If no pattern matches, take the first line or meaningful chunk
            let lines = cleaned.split('\n');
            for (let line of lines) {
                let trimmed = line.trim();
                if (trimmed.length >= 4 && trimmed.length <= 40 && /[A-Z0-9]/.test(trimmed)) {
                    return trimmed;
                }
            }
            
            return cleaned.split(' ')[0] || cleaned;
        }

        async function captureAndScan() {
            if (processing) return;
            const video = document.querySelector("#reader video");
            if (!video) return;

            processing = true;
            if (navigator.vibrate) navigator.vibrate(80);
            const status = document.getElementById("status");
            const canvas = document.getElementById("debugCanvas");

            status.innerText = "⏳ Processing Image...";

            try {
                // Use enhanced image processing
                await enhanceImageForOCR(canvas, video);

                status.innerText = "📖 Reading Text...";
                
                // Try multiple OCR attempts with different settings
                let bestText = "";
                let bestConfidence = 0;
                
                // Attempt 1: Page segmentation mode 6 (uniform block of text)
                const result1 = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_pageseg_mode: 6,
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-./',
                    tessedit_ocr_engine_mode: 3
                });
                
                // Attempt 2: Page segmentation mode 7 (single text line)
                const result2 = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_pageseg_mode: 7,
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-./',
                    tessedit_ocr_engine_mode: 3
                });
                
                // Attempt 3: Page segmentation mode 8 (sparse text)
                const result3 = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_pageseg_mode: 8,
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-./',
                    tessedit_ocr_engine_mode: 3
                });
                
                // Process and combine results
                const results = [result1, result2, result3];
                
                for (let res of results) {
                    const cleaned = cleanOCRText(res.data.text);
                    const confidence = res.data.confidence || 0;
                    
                    if (cleaned.length >= 4 && confidence > bestConfidence) {
                        bestConfidence = confidence;
                        bestText = cleaned;
                    }
                }
                
                // If still not found, try with larger character whitelist
                if (!bestText || bestText.length < 4) {
                    const result4 = await Tesseract.recognize(canvas, 'eng', {
                        tessedit_pageseg_mode: 6,
                        tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz-./',
                    });
                    const cleaned = cleanOCRText(result4.data.text);
                    if (cleaned.length >= 4) {
                        bestText = cleaned;
                    }
                }
                
                if (bestText && bestText.length >= 4) {
                    status.innerText = "🎯 MATCH: " + bestText;
                    const q = prompt(`Enter Quantity for:\n${bestText}`, "1");
                    
                    if (q && !isNaN(q)) {
                        status.innerText = "🚀 Syncing...";
                        await fetch(SCRIPT_URL, {
                            method: "POST", 
                            mode: "no-cors", 
                            body: JSON.stringify([{ pn: bestText, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() }])
                        });
                        status.innerText = "✅ Saved to Google Sheets!";
                        setTimeout(() => status.innerText = "Ready", 3000);
                    } else {
                        status.innerText = "❌ Cancelled";
                        setTimeout(() => status.innerText = "Ready", 2000);
                    }
                } else {
                    status.innerText = "❌ Could not read text. Please ensure label is in the green box and well-lit.";
                    setTimeout(() => status.innerText = "Ready", 3000);
                }
            } catch (e) {
                console.error(e);
                status.innerText = "Error. Please retry with better lighting.";
                setTimeout(() => status.innerText = "Ready", 3000);
            } finally {
                processing = false;
            }
        }
    </script>
</body>
</html>
