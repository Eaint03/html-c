<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Smart Inventory</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; margin: 0; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 15px; }
        button { padding: 15px; margin: 10px 0; font-size: 16px; cursor: pointer; border-radius: 10px; width: 100%; font-weight: bold; }
        .hidden { display: none; }
        
        /* Scanner Container */
        #scanner-wrapper { 
            width: 100%; height: 320px; margin: 15px 0; background: #000; 
            border: 4px solid #333; border-radius: 12px; overflow: hidden;
            position: relative;
        }

        /* The Shutter Button (Like a Phone Camera) */
        .shutter-btn { 
            background: white; color: black; border: 5px solid #ccc; 
            width: 70px !important; height: 70px; border-radius: 50%; 
            margin: 10px auto; display: block; box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        .shutter-btn:active { background: #ddd; transform: scale(0.9); }

        .item-box { border: 1px solid #eee; padding: 12px; margin-top: 10px; background: #fafafa; border-radius: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Smart Inventory</h2>

    <div id="homePage">
        <button onclick="goTo('addPage')" style="background: #007bff; color: white;">➕ Add Stock</button>
        <button onclick="goTo('takePage')" style="background: #fd7e14; color: white;">➖ Take Stock</button>
        <button onclick="showInventory()">📋 View List</button>
    </div>

    <div id="scanPage" class="hidden">
        <h3 id="pageTitle">Scanning...</h3>
        <button onclick="goHome()" style="background: #6c757d; color: white;">⬅ Cancel</button>
        
        <div id="scanner-wrapper">
            <div id="reader" style="width: 100%;"></div>
        </div>

        <p>1. Align barcode in box<br>2. Click button to capture</p>
        
        <button class="shutter-btn" onclick="captureNow()"></button>
        <p><b>TAP TO SNAP</b></p>
    </div>

    <div id="inventoryBox"></div>
</div>

<script>
let mode = "";
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let html5QrCode;
let isScanning = false;

function goTo(page) {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");
    mode = (page === 'addPage') ? 'add' : 'take';
    document.getElementById("pageTitle").innerText = (mode === 'add') ? "Adding Item" : "Taking Item";
    
    startCamera();
}

function startCamera() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 20, qrbox: { width: 280, height: 120 } };
    
    html5QrCode.start({ facingMode: "environment" }, config, () => {
        // We ignore automatic detections here
    }).catch(err => alert("Camera Error: " + err));
}

// 🔥 THIS IS THE MANUAL CAPTURE FUNCTION
async function captureNow() {
    if (!html5QrCode) return;

    try {
        // This forces the library to scan the CURRENT frame immediately
        const result = await html5QrCode.scanFileV2(null, true); 
        // Note: Some mobile browsers need a slight workaround for scanFile on live streams
        // So we use the internal decoder on the current video frame:
        processResult(result.decodedText);
    } catch (err) {
        // If scanFile fails, we try a fallback: momentarily "listen" for a result
        const statusMsg = document.getElementById("pageTitle");
        statusMsg.innerText = "Processing...";
        
        // We "gate" the success callback so it only works once after clicking
        isScanning = true; 
        setTimeout(() => { isScanning = false; statusMsg.innerText = "Try Again"; }, 2000);
    }
}

// Fallback logic for the listener
function onScanSuccess(decodedText) {
    if (isScanning) {
        isScanning = false;
        processResult(decodedText);
    }
}

// Re-start the camera with the listener enabled for the "Shutter" effect
function startCamera() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { fps: 20, qrbox: { width: 280, height: 120 } };
    
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
}

function processResult(text) {
    let clean = text.trim();
    if (clean.startsWith("1P")) clean = clean.substring(2);
    else if (clean.startsWith("P")) clean = clean.substring(1);

    if (navigator.vibrate) navigator.vibrate(100);
    
    html5QrCode.stop().then(() => {
        handleInventory(clean);
    });
}

function handleInventory(code) {
    if (inventory[code]) {
        let qty = prompt("Found: " + inventory[code].name + "\nStock: " + inventory[code].qty + "\nQuantity to " + mode + ":", "1");
        if (qty) {
            inventory[code].qty += (mode === 'add' ? parseInt(qty) : -parseInt(qty));
            localStorage.setItem("inventory", JSON.stringify(inventory));
            alert("Updated!");
        }
        location.reload();
    } else {
        if (mode === "add") {
            let name = prompt("New Part! Enter Name for P/N: " + code);
            if (name) {
                inventory[code] = { name: name, qty: 1 };
                localStorage.setItem("inventory", JSON.stringify(inventory));
                alert("Saved!");
            }
            location.reload();
        } else {
            alert("Part not found.");
            location.reload();
        }
    }
}

function goHome() { location.reload(); }

function showInventory() {
    let html = "<h3>📋 Stock List</h3>";
    for (let code in inventory) {
        html += `<div class="item-box"><b>${inventory[code].name}</b><br>PN: ${code}<br>Qty: ${inventory[code].qty}</div>`;
    }
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>
</body>
</html>
