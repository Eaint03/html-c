<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Inventory - Touch Focus</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        button { 
            width: 95%; max-width: 380px; padding: 20px; margin: 10px 0; 
            border-radius: 15px; border: none; font-size: 18px; font-weight: bold; 
            cursor: pointer; 
        }
        .btn-capture { 
            background: var(--green); color: white; font-size: 24px; 
            border: 4px solid white; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        #reader-container { 
            position: relative; width: 100%; max-width: 400px; 
            margin: 10px auto; border-radius: 20px; overflow: hidden; border: 3px solid #444;
            touch-action: none; /* Required for touch focus */
        }

        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 40px; border: 2px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.85); z-index: 5; pointer-events: none;
        }

        #status { margin: 15px; color: #00ff00; font-weight: bold; font-size: 1.3rem; }
        #debugCanvas { width: 95%; max-width: 380px; background: white; border-radius: 10px; display: block; margin: 10px auto; border: 2px solid #555; }
    </style>
</head>

<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 Precision Scanner</h1>
    <button style="background:var(--blue); color:white;" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
    <button style="background:#333; color:white;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Tap Screen to Focus</div>

    <div id="reader-container" onclick="applyTouchFocus(event)">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>

    <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE & SAVE</button>
    <button style="background:#cc0000; color:white;" onclick="goTo('homePage')">Exit</button>
    
    <canvas id="debugCanvas"></canvas>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";

let mode = "";
let html5QrCode = null;
let processing = false;

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 25, 
        aspectRatio: 1.0,
        videoConstraints: { 
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        } 
    };
    try {
        await html5QrCode.start({ facingMode: "environment" }, config, () => {}, () => {});
        document.getElementById("status").innerText = "Ready (Tap to Focus)";
    } catch (e) { alert(e); }
}

// 🔥 NEW: TOUCH FOCUS FUNCTION
async function applyTouchFocus(event) {
    const video = document.querySelector("#reader video");
    if (!video) return;

    const track = video.srcObject.getVideoTracks()[0];
    const capabilities = track.getCapabilities();

    if (capabilities.focusMode && capabilities.focusMode.includes('manual')) {
        try {
            await track.applyConstraints({
                advanced: [{ focusMode: "manual", focusDistance: event.clientX / window.innerWidth }]
            });
            document.getElementById("status").innerText = "Focused 🎯";
            setTimeout(() => { document.getElementById("status").innerText = "Ready to Capture"; }, 1000);
        } catch (e) { console.log("Focus failed", e); }
    } else {
        // Fallback for iPhones/some Androids: trigger auto-focus toggle
        try {
            await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
            document.getElementById("status").innerText = "Auto-Focusing...";
        } catch (e) { console.log(e); }
    }
}

function killScanner() { if (html5QrCode) { html5QrCode.stop().then(() => { html5QrCode = null; }).catch(() => {}); } }

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    if (navigator.vibrate) navigator.vibrate(100);
    const status = document.getElementById("status");
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");

    status.innerText = "⏳ Reading Geometry...";

    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const cropW = vW * 0.85;
    const cropH = vH * 0.08; 
    const sx = (vW - cropW) / 2;
    const sy = (vH - cropH) / 2;

    canvas.width = 2500;
    canvas.height = 250;

    // 🔥 IMPROVED: Using Ultra-Contrast for Z vs 2 / 0 vs O
    const filters = [
        'grayscale(1) contrast(15) brightness(1.1)', // Sharpest vertical lines
        'grayscale(1) contrast(20) brightness(1.0)', // Best for Z/2 corners
        'grayscale(1) contrast(10) brightness(0.9)'  // Best for O/0 loops
    ];

    let allReads = [];

    for (let f of filters) {
        ctx.filter = f;
        ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

        const res = await Tesseract.recognize(canvas, 'eng', {
            tessedit_pageseg_mode: 7,
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-'
        });

        let text = res.data.text.replace(/\s/g, "").toUpperCase();
        if (text.length > 3) allReads.push(text);
    }

    // Consensus Logic: Finds the version most filters agree on
    let pn = allReads.length > 0 ? allReads.sort((a,b) =>
          allReads.filter(v => v===a).length - allReads.filter(v => v===b).length
    ).pop() : null;

    if (pn) {
        status.innerText = "✅ " + pn;
        const q = prompt(`Quantity for:\n${pn}`, "1");
        if (q && !isNaN(q)) {
            status.innerText = "🚀 Syncing...";
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors", 
                    body: JSON.stringify([{ pn: pn, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() }])
                });
                status.innerText = "🎯 Saved Successfully!";
                setTimeout(() => status.innerText = "Ready", 3000);
            } catch (err) { status.innerText = "Sync Error"; }
        }
    } else { status.innerText = "❌ Scan Error. Retap Focus."; }
    processing = false;
}
</script>

</body>
</html>
