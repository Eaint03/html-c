<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ESP32 BLE Control</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d4ff; }
    #statusBadge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-weight: bold; margin: 15px 0; }
    .disconnected-badge { background: #ff4444; color: white; }
    .connected-badge { background: #00c853; color: white; }
    .btn { padding: 12px 28px; margin: 8px; font-size: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #btnConnect { background: #00d4ff; color: #000; }
    #btnDisconnect { background: #ff4444; color: #fff; }
    #dataBox { background: #0f3460; border-radius: 10px; padding: 15px; margin: 20px 0; }
    #dataBox h3 { color: #00d4ff; }
    #receivedData { font-size: 18px; color: #00ff88; margin-top: 8px; }
    #log { background: #0a0a1a; border: 1px solid #333; border-radius: 10px; padding: 15px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    .log-info { color: #00d4ff; }
    .log-recv { color: #00ff88; }
    .log-send { color: #ff9800; }
    .log-error { color: #ff4444; }
    .log-ok { color: #00c853; }
  </style>
</head>
<body>
  <h1>🔵 ESP32 BLE Control</h1>
  <div id="statusBadge" class="disconnected-badge">● Disconnected</div>
  <br>
  <button class="btn" id="btnConnect" onclick="connectBLE()">Connect to ESP32</button>
  <button class="btn" id="btnDisconnect" onclick="disconnectBLE()" disabled>Disconnect</button>
  <br>
  <button class="btn" id="btnLedOn" onclick="sendData('LED_ON')" disabled style="background:#00c853;color:#fff">💡 LED ON</button>
  <button class="btn" id="btnLedOff" onclick="sendData('LED_OFF')" disabled style="background:#555;color:#fff">🌑 LED OFF</button>

  <div id="dataBox">
    <h3>📩 Data from ESP32:</h3>
    <div id="receivedData">— waiting —</div>
  </div>

  <h3>📋 Log</h3>
  <div id="log"></div>

<script>
  const SERVICE_UUID        = '12345678-1234-1234-1234-123456789abc';
  const CHARACTERISTIC_UUID = 'abcdefab-1234-1234-1234-abcdefabcdef';

  let bleDevice = null;
  let bleChar   = null;

  function log(msg, type = 'info') {
    const logDiv = document.getElementById('log');
    const time = new Date().toLocaleTimeString();
    logDiv.innerHTML += `<span class="log-${type}">[${time}] ${msg}</span><br>`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function setStatus(state) {
    const badge = document.getElementById('statusBadge');
    const btns = ['btnLedOn','btnLedOff'];
    if (state === 'connected') {
      badge.textContent = '● Connected ✅';
      badge.className = 'connected-badge';
      document.getElementById('btnConnect').disabled = true;
      document.getElementById('btnDisconnect').disabled = false;
      btns.forEach(id => document.getElementById(id).disabled = false);
    } else {
      badge.textContent = '● Disconnected';
      badge.className = 'disconnected-badge';
      document.getElementById('btnConnect').disabled = false;
      document.getElementById('btnDisconnect').disabled = true;
      btns.forEach(id => document.getElementById(id).disabled = true);
    }
  }

  async function connectBLE() {
    if (!navigator.bluetooth) {
      log('Web Bluetooth not supported! Use Chrome or Edge.', 'error');
      return;
    }
    try {
      log('Scanning for ESP32_MyBoard...', 'info');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'ESP32_MyBoard' }],
        optionalServices: [SERVICE_UUID]
      });
      bleDevice.addEventListener('gattserverdisconnected', () => {
        setStatus('disconnected');
        log('ESP32 disconnected!', 'error');
      });
      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar        = await service.getCharacteristic(CHARACTERISTIC_UUID);
      await bleChar.startNotifications();
      bleChar.addEventListener('characteristicvaluechanged', (e) => {
        const value = new TextDecoder().decode(e.target.value);
        document.getElementById('receivedData').textContent = value;
        log('Received: ' + value, 'recv');
      });
      setStatus('connected');
      log('Connected to ESP32_MyBoard!', 'ok');
    } catch(err) {
      setStatus('disconnected');
      log('Error: ' + err.message, 'error');
    }
  }

  async function sendData(message) {
    if (!bleChar) { log('Not connected!', 'error'); return; }
    try {
      await bleChar.writeValue(new TextEncoder().encode(message));
      log('Sent: ' + message, 'send');
    } catch(err) {
      log('Send failed: ' + err.message, 'error');
    }
  }

  function disconnectBLE() {
    if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect();
    setStatus('disconnected');
    log('Disconnected.', 'info');
  }
</script>
</body>
</html>
