<!DOCTYPE html>
<html>
<head>
    <title>📦 Smart Inventory</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 12px;
            margin: 10px;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        #scanner {
            width: 100%;
            max-width: 400px;
            height: 250px;
            margin: auto;
            background: #eee;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80%;
        }

        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>📦 Smart Inventory System</h2>

<div id="homePage">
    <button onclick="goTo('addPage')">➕ Add Inventory</button>
    <button onclick="goTo('takePage')">➖ Take Inventory</button>
    <button onclick="showInventory()">📋 View Inventory</button>
</div>

<div id="addPage" class="hidden">
    <h3>Add Inventory</h3>
    <button onclick="goHome()">⬅ Back</button>
    <button onclick="startScanner('add')">📷 Scan P/N</button>

    <div id="scanner"></div>
    <p>Result: <b id="resultAdd">None</b></p>

    <div id="formBox" class="hidden">
        <input id="name" placeholder="Component Name"><br>
        <input id="qty" type="number" placeholder="Quantity"><br>
        <input id="location" placeholder="Location"><br>
        <button onclick="saveNewItem()">💾 Save</button>
    </div>
</div>

<div id="takePage" class="hidden">
    <h3>Take Inventory</h3>
    <button onclick="goHome()">⬅ Back</button>
    <button onclick="startScanner('take')">📷 Scan P/N</button>

    <div id="scanner"></div>
    <p>Result: <b id="resultTake">None</b></p>
</div>

<div id="inventoryBox"></div>

<script>
let mode = "";
let currentCode = "";
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let html5QrCode;

function saveData() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

// NAVIGATION
function goTo(page) {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
    document.getElementById(page).classList.remove("hidden");
}

function goHome() {
    if (html5QrCode) {
        html5QrCode.stop().catch(() => {});
    }
    document.getElementById("homePage").classList.remove("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
}

// 🔥 INDUSTRIAL PARSER (Fixes DigiKey/Mouser prefix issues)
function cleanPartNumber(rawCode) {
    let clean = rawCode.trim();
    // Remove common prefixes: 1P (Supplier PN), P (PN), K (PO), Q (Qty)
    if (clean.startsWith("1P")) return clean.substring(2);
    if (clean.startsWith("P"))  return clean.substring(1);
    if (clean.startsWith("K"))  return clean.substring(1);
    return clean;
}

// 🔥 SCANNER (Upgraded Logic)
function startScanner(m) {
    mode = m;
    
    // Reset display
    document.getElementById("resultAdd").innerText = "Scanning...";
    document.getElementById("resultTake").innerText = "Scanning...";

    if(html5QrCode) { html5QrCode.clear(); }
    html5QrCode = new Html5Qrcode("scanner");

    const config = { 
        fps: 20, 
        qrbox: { width: 250, height: 120 } // Narrow box for stacked barcodes
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => {
            const finalPN = cleanPartNumber(decodedText);
            
            // Success! Stop scanner and update UI
            html5QrCode.stop().then(() => {
                currentCode = finalPN;
                if (mode === "add") {
                    document.getElementById("resultAdd").innerText = finalPN;
                } else {
                    document.getElementById("resultTake").innerText = finalPN;
                }
                handleScan(finalPN);
            });
        }
    ).catch(err => {
        alert("Camera error: Ensure you are on HTTPS");
    });
}

// LOGIC
function handleScan(code) {
    if (inventory[code]) {
        let item = inventory[code];
        if (mode === "add") {
            let addQty = prompt("Add qty for " + item.name);
            if (addQty) {
                item.qty += parseInt(addQty);
                saveData();
                alert("Updated!");
            }
        } else {
            let takeQty = prompt("Take qty for " + item.name);
            if (takeQty) {
                if (parseInt(takeQty) > item.qty) {
                    alert("Not enough stock");
                } else {
                    item.qty -= parseInt(takeQty);
                    saveData();
                    alert("Updated!");
                }
            }
        }
    } else {
        if (mode === "add") {
            document.getElementById("formBox").classList.remove("hidden");
            document.getElementById("name").value = code;
        } else {
            alert("Item not found");
        }
    }
}

// SAVE NEW
function saveNewItem() {
    let name = document.getElementById("name").value;
    let qty = parseInt(document.getElementById("qty").value);
    let location = document.getElementById("location").value;

    inventory[currentCode] = { name, qty, location };
    saveData();

    alert("Saved!");
    document.getElementById("formBox").classList.add("hidden");
}

// VIEW
function showInventory() {
    let html = "<h3>Inventory</h3>";
    for (let code in inventory) {
        let item = inventory[code];
        html += `
        <div class="box">
            ${item.name}<br>
            ${code}<br>
            Qty: ${item.qty}<br>
            Location: ${item.location}
        </div>`;
    }
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>

</body>
</html>
