<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory</title>

    <!-- LIBRARIES -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
        }

        h1 {
            margin-top: 40px;
        }

        .hidden {
            display: none;
        }

        .container {
            margin-top: 50px;
        }

        button {
            width: 200px;
            padding: 15px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: auto;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- 🔥 HOME PAGE -->
<div id="homePage" class="container">
    <h1>📦 Smart Inventory</h1>

    <button onclick="openScanner('add')">➕ Add Item</button>
    <br>
    <button onclick="openScanner('take')">➖ Take Item</button>
</div>

<!-- 🔥 SCAN PAGE -->
<div id="scanPage" class="hidden container">
    <h2>📸 Scan Component</h2>

    <div id="reader"></div>

    <button onclick="captureAndProcess()">📸 Capture</button>
    <button onclick="stopScanner()">❌ Cancel</button>

    <p id="status"></p>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 10, // 🔥 reduce lag
        qrbox: { width: 280, height: 120 },
        aspectRatio: 1.7778,
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        () => {},
        () => {}
    ).catch(err => alert(err));
}

// CAPTURE + OCR
async function captureAndProcess() {
    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const imageFile = await html5QrCode.takePhoto();

        // 🔥 STOP CAMERA FIRST
        await html5QrCode.stop();

        status.innerText = "🧠 Reading P/N...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng'
        );

        let rawText = result.data.text;

        let pn = extractPN(rawText);

        if (!pn) {
            pn = prompt("❌ Cannot detect P/N.\nEnter manually:");
        }

        if (!pn) {
            status.innerText = "❌ No input";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn);

    } catch (err) {
        status.innerText = "❌ OCR Failed";
        console.error(err);
    }
}

// SMART P/N
function extractPN(text) {
    let cleaned = text
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9\-]/g, "")
        .toUpperCase();

    let matches = cleaned.match(/[A-Z0-9\-]{4,20}/g);

    if (!matches) return "";

    return matches.sort((a,b) => b.length - a.length)[0];
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS
function processData(pn) {

    if (inventory[pn]) {

        let qty = prompt(
            `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
            "1"
        );

        if (qty) {
            if (mode === "add") inventory[pn].qty += parseInt(qty);
            else inventory[pn].qty -= parseInt(qty);
        }

    } else {

        if (mode === "add") {
            let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

            inventory[pn] = {
                desc: desc || "No Desc",
                qty: 1
            };
        } else {
            alert("❌ Part not found!");
        }
    }

    localStorage.setItem("full_inv", JSON.stringify(inventory));
    location.reload();
}
</script>

</body>
</html>
