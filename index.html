<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory OCR</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .hidden { display: none; }

        button {
            padding: 15px;
            margin: 10px;
            width: 200px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #007bff;
            color: white;
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: auto;
            position: relative;
        }

        #guideBox {
            position: absolute;
            border: 3px solid red;
            width: 70%;
            height: 15%;
            top: 45%;
            left: 15%;
            pointer-events: none;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- HOME -->
<div id="homePage">
    <h1>📦 Smart Inventory</h1>
    <button onclick="openScanner('add')">➕ Add Item</button>
    <button onclick="openScanner('take')">➖ Take Item</button>
</div>

<!-- SCANNER -->
<div id="scanPage" class="hidden">
    <h2>📸 Scan MFR PN</h2>

    <div id="reader">
        <div id="guideBox"></div>
    </div>

    <p>📌 Align ONLY "MFR PN" inside the red box</p>

    <button onclick="captureAndProcess()">📸 Capture</button>
    <button onclick="stopScanner()">❌ Cancel</button>

    <p id="status"></p>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 10,
        qrbox: { width: 200, height: 60 }, // 🔥 SMALL BOX
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        () => {},
        () => {}
    );
}

// 🔥 AUTO CROP CENTER (ZOOM EFFECT)
function preprocessImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            // crop center strip (where guide box is)
            const cropWidth = img.width * 0.7;
            const cropHeight = img.height * 0.2;

            const startX = (img.width - cropWidth) / 2;
            const startY = (img.height - cropHeight) / 2;

            canvas.width = 640;
            canvas.height = 200;

            ctx.drawImage(
                img,
                startX, startY, cropWidth, cropHeight,
                0, 0, canvas.width, canvas.height
            );

            canvas.toBlob(resolve, "image/jpeg", 0.8);
        };
    });
}

// CAPTURE + OCR
async function captureAndProcess() {
    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const raw = await html5QrCode.takePhoto();

        await html5QrCode.stop();

        // 🔥 crop image
        const imageFile = await preprocessImage(raw);

        status.innerText = "🧠 Reading MFR PN...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng',
            {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-.,'
            }
        );

        let words = result.data.words;

        let filtered = words
            .filter(w => w.confidence > 60)
            .map(w => w.text)
            .join(" ");

        let pn = extractPN(filtered);

        // 🔥 CONFIRM
        if (!pn) {
            pn = prompt("❌ OCR failed.\nEnter manually:");
        } else {
            pn = prompt(`Detected:\n${pn}\n\nConfirm or edit:`, pn);
        }

        if (!pn) {
            status.innerText = "❌ No input";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn.toUpperCase());

    } catch (err) {
        status.innerText = "❌ OCR Failed";
        console.error(err);
    }
}

// 🔥 EXTRACT MFR PN ONLY
function extractPN(text) {

    text = text.toUpperCase();
    text = text.replace(/\n/g, " ");

    let match = text.match(/MFR\s*P?N?\s*[:\-]?\s*([A-Z0-9\-\,\.]+)/);

    if (match && match[1]) return match[1];

    return "";
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS
function processData(pn) {

    if (inventory[pn]) {

        let qty = prompt(
            `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
            "1"
        );

        if (qty) {
            if (mode === "add") inventory[pn].qty += parseInt(qty);
            else inventory[pn].qty -= parseInt(qty);
        }

    } else {

        if (mode === "add") {
            let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

            inventory[pn] = {
                desc: desc || "No Desc",
                qty: 1
            };
        } else {
            alert("❌ Part not found!");
        }
    }

    localStorage.setItem("full_inv", JSON.stringify(inventory));
    location.reload();
}
</script>

</body>
</html>
