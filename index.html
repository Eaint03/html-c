<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Intelligence MFR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        button { width: 95%; max-width: 380px; padding: 18px; margin: 6px 0; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        #reader-container { position: relative; width: 100%; max-width: 380px; margin: 5px auto; border-radius: 15px; overflow: hidden; border: 2px solid #444; }
        #scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; border: 3px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.7); z-index: 5; pointer-events: none; }
        
        #result-card { background: #1e1e1e; border: 1px solid #444; padding: 20px; border-radius: 15px; width: 90%; max-width: 380px; margin-top: 15px; text-align: left; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 15px; }
        label { color: #888; font-size: 0.75rem; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; }
        
        #status { margin: 10px; color: #00ff00; font-weight: bold; height: 24px; }
        .btn-sync { background: var(--green); color: white; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 MFR Intelligence v20</h1>
    <button style="background:var(--blue); color:white;" onclick="goTo('scanPage', 'add')">➕ Incoming Stock</button>
    <button style="background:#333; color:white;" onclick="goTo('scanPage', 'take')">➖ Outgoing Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Ready</div>
    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>
    
    <button id="capBtn" style="background:var(--blue); color:white;" onclick="captureAndScan()">📸 CAPTURE LABEL</button>

    <div id="result-area" class="hidden">
        <div id="result-card">
            <div class="input-group">
                <label>Manufacturer Part Number</label>
                <input type="text" id="resPN">
            </div>
            <div class="input-group">
                <label>Description</label>
                <input type="text" id="resDesc">
            </div>
            <div class="input-group">
                <label>Enter Quantity</label>
                <input type="number" id="resQty" value="1" onclick="this.select()">
            </div>
            
            <button class="btn-sync" onclick="syncToSheet()">🚀 SYNC TO SHEET</button>
            <button style="background:transparent; color:#888; width:100%; font-size: 14px;" onclick="resetScan()">← Retake Photo</button>
        </div>
    </div>

    <button style="background:#cc0000; color:white; margin-top:20px;" onclick="goTo('homePage')">Exit</button>
    <canvas id="debugCanvas" class="hidden"></canvas>
</div>

<script>
const GOOGLE_API_KEY = "AIzaSyBjzZf1DVzZFuaf9tC5SW8x9bjqp1t7HQQ"; 
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzOLEIsa7GxDLCmWHdVTiYuHfyvXT95wU62PKlXBpVGfhR2L5rgK_yZ4b37Np6VjY7/exec";

let mode = ""; let html5QrCode = null; let processing = false;

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); resetScan(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    try { await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {}); } catch (e) { alert(e); }
}

function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

function resetScan() {
    document.getElementById("result-area").classList.add("hidden");
    document.getElementById("capBtn").classList.remove("hidden");
    document.getElementById("status").innerText = "Ready";
    processing = false;
}

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    document.getElementById("status").innerText = "🧠 High-Precision Reading...";

    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 1600; canvas.height = 1600;
    ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, 1600, 1600);

    const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    const GOOGLE_URL = `https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`;

    try {
        const response = await fetch(GOOGLE_URL, {
            method: "POST",
            body: JSON.stringify({
                requests: [{ image: { content: base64Image }, features: [{ type: "TEXT_DETECTION" }] }]
            })
        });
        const data = await response.json();
        const fullText = data.responses[0].textAnnotations[0].description;
        const lines = fullText.split('\n');
        
        let mfrPn = ""; 
        let description = "";

        // --- INTELLIGENT ANCHOR LOGIC ---
        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim().toUpperCase();

            // 1. ANCHOR SEARCH: Look for MFR PN indicators
            if (line.includes("MFR PN") || line.includes("MFR#") || line.includes("MAT#") || line === "P/N" || line === "MPN") {
                // Usually the number is the line below the label
                if (lines[i+1]) mfrPn = lines[i+1].trim().replace(/\s/g, "");
            }

            // 2. PATTERN SEARCH: muRata (GRM/LQH), Infineon (IPD/IPP/BSC/TLE), Samsung (CL)
            if (!mfrPn) {
                if (/^(GRM|LQH|IPD|IPP|BSC|TLE|BTS|ERJ|BZT|CL\d)/.test(line)) {
                    mfrPn = line.replace(/\s/g, "");
                }
            }

            // 3. DESCRIPTION SEARCH: Looking for component types
            if (!description && (line.includes('DIODE') || line.includes('MOSFET') || line.includes('RESISTOR') || line.includes('CAP') || line.includes('ZENER'))) {
                description = line;
            }
        }

        // Clean DigiKey internal tails
        if (mfrPn.endsWith("-ND")) mfrPn = mfrPn.replace("-ND", "");

        document.getElementById("resPN").value = mfrPn || "Not Found - Type Manually";
        document.getElementById("resDesc").value = description || "";
        document.getElementById("status").innerText = "✅ Identify Complete";
        document.getElementById("result-area").classList.remove("hidden");
        document.getElementById("capBtn").classList.add("hidden");

    } catch (err) { 
        document.getElementById("status").innerText = "❌ Error Reading";
        processing = false;
    }
}

async function syncToSheet() {
    const pn = document.getElementById("resPN").value;
    const desc = document.getElementById("resDesc").value;
    const qty = document.getElementById("resQty").value;

    document.getElementById("status").innerText = "🚀 Syncing...";
    await fetch(SCRIPT_URL, { 
        method: "POST", mode: "no-cors", 
        body: JSON.stringify([{ pn, desc, qty, mode, date: new Date().toLocaleString() }]) 
    });
    document.getElementById("status").innerText = "✅ Saved!";
    setTimeout(resetScan, 2000);
}
</script>
</body>
</html>
