<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        video {
            width: 100%;
            border-radius: 10px;
        }

        /* CAMERA SCREEN */
        #cameraPage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .capture-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: 5px solid #ccc;
        }

        .top-bar {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }

        .top-bar button {
            width: auto;
            background: rgba(0,0,0,0.6);
        }

    </style>
</head>

<body>

<h1>Welcome to smart Inventory System</h1>

<!-- HOME -->
<div class="container" id="home">
    <h3>Select Action</h3>

    <button onclick="goToAdd()">➕ Add Inventory</button>
    <button onclick="goToTake()">📤 Take Inventory</button>
</div>

<!-- ADD PAGE (3 BUTTONS) -->
<div class="container hidden" id="addPage">
    <h3>➕ Add Inventory</h3>

    <button onclick="openCamera()">📷 Take Photo</button>
    <input type="file" id="uploadInput">
    <button onclick="uploadImage()">📁 Upload Image</button>

    <button onclick="goHome()">Back</button>
</div>

<!-- CAMERA PAGE -->
<div id="cameraPage" class="hidden">

    <video id="camera" autoplay></video>

    <div class="top-bar">
        <button onclick="closeCamera()">Back</button>
    </div>

    <button class="capture-btn" onclick="takePhoto()"></button>

</div>

<!-- TAKE PAGE -->
<div class="container hidden" id="takePage">
    <h3>📤 Take Inventory</h3>
    <button onclick="goHome()">Back</button>
</div>

<script>

let video = document.getElementById("camera");
let stream = null;

// NAVIGATION
function goToAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addPage").classList.remove("hidden");
}

function goToTake() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("takePage").classList.remove("hidden");
}

function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
}

// CAMERA FLOW
async function openCamera() {
    document.getElementById("cameraPage").classList.remove("hidden");

    stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
    });

    video.srcObject = stream;
}

function closeCamera() {
    document.getElementById("cameraPage").classList.add("hidden");

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
}

// TAKE PHOTO
function takePhoto() {

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    processImage(canvas);
}

// UPLOAD FLOW
function uploadImage() {
    let file = document.getElementById("uploadInput").files[0];

    if (!file) {
        alert("Upload image first");
        return;
    }

    let reader = new FileReader();

    reader.onload = function() {
        let img = new Image();
        img.onload = function() {
            let canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;

            let ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);

            processImage(canvas);
        };
        img.src = reader.result;
    };

    reader.readAsDataURL(file);
}

// OCR + SAVE
function processImage(canvas) {

    canvas.toBlob(async function(blob) {

        let reader = new FileReader();

        reader.onload = async function() {

            let base64 = reader.result.split(',')[1];

            let response = await fetch(
                "https://vision.googleapis.com/v1/images:annotate?key=YOUR_API_KEY",
                {
                    method: "POST",
                    body: JSON.stringify({
                        requests: [
                            {
                                image: { content: base64 },
                                features: [{ type: "TEXT_DETECTION" }]
                            }
                        ]
                    })
                }
            );

            let result = await response.json();

            if (!result.responses || !result.responses[0].fullTextAnnotation) {
                alert("No text detected");
                return;
            }

            let text = result.responses[0].fullTextAnnotation.text;

            console.log(text);

            let component = "";
            let quantity = 1;

            let descMatch = text.match(/Desc[:\s]*(.*)/i);
            if (descMatch) component = descMatch[1];

            let qtyMatch = text.match(/Quantity[:\s]*(\d+)/i);
            if (qtyMatch) quantity = parseInt(qtyMatch[1]);

            await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
                method: "POST",
                body: JSON.stringify({
                    component: component,
                    quantity: quantity,
                    location: ""
                })
            });

            alert("Saved!\n" + component + "\nQty: " + quantity);
        };

        reader.readAsDataURL(blob);

    }, "image/jpeg");
}

</script>

</body>
</html>
