<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AirSense</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #F5F5F3; color: #1A1A1A; }
  .app { max-width: 430px; margin: 0 auto; padding: 16px; padding-bottom: 40px; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-top: 12px; }
  .app-title { font-size: 22px; font-weight: 600; }
  .app-sub { font-size: 13px; color: #6B6B6B; margin-top: 2px; }
  .conn-badge { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; }

  .row { display: flex; gap: 10px; margin-bottom: 10px; }
  .stat-card { flex: 1; background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.08); padding: 14px; }
  .stat-label { font-size: 12px; color: #6B6B6B; margin-bottom: 4px; }
  .stat-value { font-size: 18px; font-weight: 600; }

  .card { background: #fff; border-radius: 12px; border: 0.5px solid rgba(0,0,0,0.08); padding: 16px; margin-bottom: 10px; }
  .countdown-card { background: #FAEEDA; border-color: #BA7517; }
  .countdown-card .card-label { font-size: 12px; font-weight: 500; color: #BA7517; margin-bottom: 4px; }
  .countdown-card .big-num { font-size: 28px; font-weight: 600; color: #BA7517; }
  .countdown-card .card-sub { font-size: 12px; color: #BA7517; margin-top: 2px; }

  .section-label { font-size: 11px; font-weight: 600; color: #ABABAB; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 14px; }
  .field-label { font-size: 13px; color: #6B6B6B; margin-bottom: 8px; margin-top: 14px; }

  .override-row { display: flex; gap: 10px; }
  .override-btn { flex: 1; padding: 12px; border-radius: 8px; border: 0.5px solid; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-on  { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; }
  .btn-off { background: #FCEBEB; border-color: #E24B4A; color: #E24B4A; }
  .btn-on:active, .btn-off:active { opacity: 0.7; }

  .selector { display: flex; justify-content: space-between; align-items: center; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 12px; cursor: pointer; background: #fff; width: 100%; font-size: 14px; }
  .brand-list { border: 0.5px solid rgba(0,0,0,0.08); border-radius: 8px; margin-top: 4px; overflow: hidden; display: none; }
  .brand-list.open { display: block; }
  .brand-item { padding: 12px; border-bottom: 0.5px solid rgba(0,0,0,0.08); cursor: pointer; font-size: 14px; }
  .brand-item:last-child { border-bottom: none; }
  .brand-item:hover, .brand-item.active { background: #E1F5EE; color: #0F6E56; font-weight: 500; }

  .timer-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .timer-pip { padding: 6px 10px; border-radius: 6px; border: 0.5px solid rgba(0,0,0,0.08); background: #F5F5F3; font-size: 11px; color: #6B6B6B; cursor: pointer; }
  .timer-pip.active { background: #E1F5EE; border-color: #1D9E75; color: #0F6E56; font-weight: 500; }

  .toggle { display: flex; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 8px; overflow: hidden; }
  .toggle-btn { flex: 1; padding: 11px; text-align: center; cursor: pointer; font-size: 13px; color: #6B6B6B; background: #F5F5F3; border: none; }
  .toggle-btn.active { background: #E1F5EE; color: #0F6E56; font-weight: 500; }

  .temp-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .temp-btn { width: 40px; height: 40px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.08); background: #F5F5F3; font-size: 12px; color: #6B6B6B; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .temp-btn.active { background: #E6F1FB; border-color: #378ADD; color: #378ADD; font-weight: 500; }

  .preview { background: #F5F5F3; border-radius: 8px; padding: 12px; margin-top: 16px; font-size: 13px; color: #6B6B6B; line-height: 1.6; }
  .preview b { color: #1A1A1A; }

  .save-btn { width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: 10px; padding: 14px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; }
  .save-btn:active { opacity: 0.8; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1A1A1A; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  #temp-section { display: none; }
  #countdown-card { display: none; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="app-title">AirSense</div>
      <div class="app-sub">Smart AC controller</div>
    </div>
    <div class="conn-badge" id="conn-badge" style="background:#FCEBEB">
      <div class="conn-dot" id="conn-dot" style="background:#E24B4A"></div>
      <span id="conn-text" style="color:#E24B4A">Offline</span>
    </div>
  </div>

  <!-- Status -->
  <div class="row">
    <div class="stat-card">
      <div class="stat-label">Room</div>
      <div class="stat-value" id="presence-val" style="color:#ABABAB">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">AC status</div>
      <div class="stat-value" id="ac-val" style="color:#ABABAB">—</div>
    </div>
  </div>

  <!-- Countdown -->
  <div class="card countdown-card" id="countdown-card">
    <div class="card-label">Countdown</div>
    <div class="big-num" id="countdown-val">—</div>
    <div class="card-sub" id="countdown-sub">until AC turns off</div>
  </div>

  <!-- Manual override -->
  <div class="card">
    <div class="section-label">Manual override</div>
    <div class="override-row">
      <button class="override-btn btn-on"  onclick="publish('airsense/ac/command','ON')">Turn ON</button>
      <button class="override-btn btn-off" onclick="publish('airsense/ac/command','OFF')">Turn OFF</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="section-label">Settings</div>

    <div class="field-label">AC brand</div>
    <button class="selector" onclick="toggleBrands()">
      <span id="brand-label">Daikin</span>
      <span id="brand-arrow">▼</span>
    </button>
    <div class="brand-list" id="brand-list"></div>

    <div class="field-label">Delay timer — <span id="timer-label">5 min</span></div>
    <div class="timer-grid" id="timer-grid"></div>

    <div class="field-label">When room is empty</div>
    <div class="toggle">
      <button class="toggle-btn active" id="btn-off-action" onclick="setAction('OFF')">Turn off</button>
      <button class="toggle-btn"        id="btn-eco-action" onclick="setAction('ECO')">Eco mode</button>
    </div>

    <div id="temp-section">
      <div class="field-label">Eco temperature — <span id="temp-label">26</span> °C</div>
      <div class="temp-grid" id="temp-grid"></div>
    </div>

    <div class="preview" id="preview"></div>

    <button class="save-btn" onclick="saveSettings()">Save settings</button>
  </div>

</div>

<div class="toast" id="toast">Settings saved</div>

<script>
// ─── CREDENTIALS ─────────────────────────────────────────────
const BROKER_HOST = '5153e4b6809949dea356766ed8a948f9.s1.eu.hivemq.cloud';
const BROKER_PORT = 8884;
const MQTT_USER   = 'Eaint';
const MQTT_PASS   = 'Eaint6677';
// ─────────────────────────────────────────────────────────────

const BRANDS  = ['Daikin','Mitsubishi','MitsubishiHeavy','Panasonic','LG','Samsung','Toshiba','Fujitsu','Sharp','Hitachi'];
const TIMERS  = [30,60,120,180,300,600,900,1200,1800];
const TEMPS   = Array.from({length:15},(_,i)=>i+16);

let selectedBrand  = 'Daikin';
let selectedTimer  = 300;
let selectedAction = 'OFF';
let selectedTemp   = 26;
let mqttClient     = null;

function fmtTimer(s) {
  return s < 60 ? s + ' sec' : Math.round(s/60) + ' min';
}

// ─── Build brand list ────────────────────────────────────────
const brandList = document.getElementById('brand-list');
BRANDS.forEach(b => {
  const el = document.createElement('div');
  el.className = 'brand-item' + (b === selectedBrand ? ' active' : '');
  el.textContent = b;
  el.onclick = () => {
    selectedBrand = b;
    document.getElementById('brand-label').textContent = b;
    document.querySelectorAll('.brand-item').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    toggleBrands();
    updatePreview();
  };
  brandList.appendChild(el);
});

function toggleBrands() {
  brandList.classList.toggle('open');
  document.getElementById('brand-arrow').textContent = brandList.classList.contains('open') ? '▲' : '▼';
}

// ─── Build timer grid ────────────────────────────────────────
const timerGrid = document.getElementById('timer-grid');
TIMERS.forEach(v => {
  const el = document.createElement('div');
  el.className = 'timer-pip' + (v === selectedTimer ? ' active' : '');
  el.textContent = fmtTimer(v);
  el.onclick = () => {
    selectedTimer = v;
    document.getElementById('timer-label').textContent = fmtTimer(v);
    document.querySelectorAll('.timer-pip').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    updatePreview();
  };
  timerGrid.appendChild(el);
});

// ─── Build temp grid ─────────────────────────────────────────
const tempGrid = document.getElementById('temp-grid');
TEMPS.forEach(t => {
  const el = document.createElement('div');
  el.className = 'temp-btn' + (t === selectedTemp ? ' active' : '');
  el.textContent = t;
  el.onclick = () => {
    selectedTemp = t;
    document.getElementById('temp-label').textContent = t;
    document.querySelectorAll('.temp-btn').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    updatePreview();
  };
  tempGrid.appendChild(el);
});

// ─── Action toggle ───────────────────────────────────────────
function setAction(a) {
  selectedAction = a;
  document.getElementById('btn-off-action').classList.toggle('active', a === 'OFF');
  document.getElementById('btn-eco-action').classList.toggle('active', a === 'ECO');
  document.getElementById('temp-section').style.display = a === 'ECO' ? 'block' : 'none';
  updatePreview();
}

// ─── Preview ─────────────────────────────────────────────────
function updatePreview() {
  const p = document.getElementById('preview');
  const t = fmtTimer(selectedTimer);
  if (selectedAction === 'ECO') {
    p.innerHTML = `If empty for <b>${t}</b> → set <b>${selectedBrand}</b> to <b>${selectedTemp} °C</b>`;
  } else {
    p.innerHTML = `If empty for <b>${t}</b> → turn <b>${selectedBrand}</b> off`;
  }
}
updatePreview();

// ─── MQTT ────────────────────────────────────────────────────
function connectMQTT() {
  const clientId = 'airsense-web-' + Math.random().toString(16).substr(2,8);
  mqttClient = new Paho.MQTT.Client(BROKER_HOST, BROKER_PORT, '/mqtt', clientId);

  mqttClient.onConnectionLost = () => setConnected(false);

  mqttClient.onMessageArrived = (msg) => {
    const topic = msg.destinationName;
    const val   = msg.payloadString;
    if (topic === 'airsense/presence')  updatePresence(val);
    if (topic === 'airsense/ac/command') updateAC(val);
    if (topic === 'airsense/countdown') updateCountdown(parseInt(val));
  };

  mqttClient.connect({
    useSSL:   true,
    userName: MQTT_USER,
    password: MQTT_PASS,
    onSuccess: () => {
      setConnected(true);
      ['airsense/presence','airsense/ac/command','airsense/countdown'].forEach(t => mqttClient.subscribe(t));
    },
    onFailure: () => setConnected(false),
  });
}

function setConnected(yes) {
  const badge = document.getElementById('conn-badge');
  const dot   = document.getElementById('conn-dot');
  const text  = document.getElementById('conn-text');
  badge.style.background = yes ? '#E1F5EE' : '#FCEBEB';
  dot.style.background   = yes ? '#1D9E75' : '#E24B4A';
  text.style.color       = yes ? '#0F6E56' : '#E24B4A';
  text.textContent       = yes ? 'Connected' : 'Offline';
}

function updatePresence(val) {
  const el = document.getElementById('presence-val');
  el.textContent = val === 'occupied' ? 'Occupied' : val === 'empty' ? 'Empty' : '—';
  el.style.color = val === 'occupied' ? '#1D9E75' : val === 'empty' ? '#BA7517' : '#ABABAB';
}

function updateAC(val) {
  const el = document.getElementById('ac-val');
  el.textContent = val || '—';
  el.style.color = val.startsWith('ON') ? '#1D9E75' : val === 'OFF' ? '#E24B4A' : val.startsWith('ECO') ? '#378ADD' : '#ABABAB';
}

function updateCountdown(sec) {
  const card = document.getElementById('countdown-card');
  if (sec > 0) {
    card.style.display = 'block';
    document.getElementById('countdown-val').textContent = fmtTimer(sec);
    document.getElementById('countdown-sub').textContent = 'until AC turns ' + selectedAction.toLowerCase();
  } else {
    card.style.display = 'none';
  }
}

function publish(topic, message) {
  if (mqttClient && mqttClient.isConnected()) {
    const msg = new Paho.MQTT.Message(String(message));
    msg.destinationName = topic;
    msg.retained = true;
    mqttClient.send(msg);
  } else {
    alert('Not connected to broker. Check your WiFi.');
  }
}

function saveSettings() {
  publish('airsense/set/timer',  selectedTimer);
  publish('airsense/set/brand',  selectedBrand);
  publish('airsense/set/action', selectedAction);
  publish('airsense/set/temp',   selectedTemp);
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

connectMQTT();
</script>
</body>
</html>
