<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Accuracy Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Large, easy-to-tap buttons for warehouse use */
        .btn { 
            width: 90%; max-width: 400px; padding: 25px; margin: 15px 0; 
            border-radius: 15px; border: none; font-size: 18px; font-weight: bold; 
            cursor: pointer; display: inline-block; transition: 0.3s;
        }
        .btn-add { background: var(--blue); color: white; }
        .btn-take { background: #333; color: white; border: 2px solid #444; }
        
        #status { margin: 20px; color: #00ff00; font-weight: bold; font-size: 1.2rem; min-height: 30px; }
        #preview { width: 80%; max-width: 300px; border-radius: 10px; margin-top: 20px; border: 3px solid #333; display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="page">
        <h1 style="margin-top: 30px;">📸 Pro Photo Scanner</h1>
        <p style="color: #888;">Clearer Photo = Better Accuracy</p>

        <div id="status">Ready</div>

        <input type="file" id="addInput" accept="image/*" capture="environment" onchange="processImage(this, 'add')">
        <input type="file" id="takeInput" accept="image/*" capture="environment" onchange="processImage(this, 'take')">

        <label for="addInput" class="btn btn-add">➕ Take Photo to ADD</label>
        <label for="takeInput" class="btn btn-take">➖ Take Photo to REMOVE</label>

        <img id="preview" src="">
        
        <canvas id="hiddenCanvas" style="display:none;"></canvas>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";

        async function processImage(input, mode) {
            if (!input.files || !input.files[0]) return;

            const status = document.getElementById("status");
            const preview = document.getElementById("preview");
            const canvas = document.getElementById("hiddenCanvas");
            const ctx = canvas.getContext("2d");

            status.innerText = "⏳ Reading Image...";
            preview.style.display = "block";
            preview.src = URL.createObjectURL(input.files[0]);

            const img = new Image();
            img.src = preview.src;
            img.onload = async () => {
                // Step 1: Normalize the size (AI likes ~1500px width)
                const scale = 1500 / img.width;
                canvas.width = 1500;
                canvas.height = img.height * scale;

                // Step 2: Aggressive Cleaning (The "Secret Sauce")
                // We use extreme contrast to turn gray cardboard into white space
                ctx.filter = 'grayscale(1) contrast(500%) brightness(120%)';
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                try {
                    // Step 3: Targeted OCR
                    const result = await Tesseract.recognize(canvas, 'eng', {
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-',
                        tessedit_pageseg_mode: 3 // Search for any block of text
                    });

                    // Step 4: Extract the Part Number (Looking for 4+ alphanumeric chars)
                    const found = result.data.text.match(/[A-Z0-9-]{4,}/g);
                    
                    if (found) {
                        const pn = found.reduce((a, b) => a.length > b.length ? a : b);
                        status.innerText = "✅ Detected: " + pn;

                        const q = prompt(`Confirm Part Number:\n${pn}\n\nEnter Quantity:`, "1");
                        if (q && !isNaN(q)) {
                            status.innerText = "🚀 Syncing...";
                            await fetch(SCRIPT_URL, {
                                method: "POST",
                                mode: "no-cors",
                                body: JSON.stringify([{ pn: pn, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() }])
                            });
                            status.innerText = "🎯 Saved Successfully!";
                        } else {
                            status.innerText = "Cancelled.";
                        }
                    } else {
                        status.innerText = "❌ No Part Number found. Try a closer photo.";
                    }
                } catch (err) {
                    status.innerText = "Error reading photo.";
                }
            };
        }
    </script>
</body>
</html>
