<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXWAH / Auto-Triage Inventory</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f0f2f5; --surface: #ffffff; --surface2: #f7f8fa; --border: #e2e6ed; --accent: #1a56db;
      --text: #111827; --muted: #6b7280; --success: #0a7a3e; --error: #b91c1c; --mono: 'IBM Plex Mono', monospace;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; max-width: 600px; margin: 20px auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    .video-wrap { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 4/3; margin-bottom: 15px; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .field { margin-bottom: 15px; }
    .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 5px; }
    .field input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--mono); font-size: 14px; }
    .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .status-bar { padding: 12px; border-radius: 8px; font-size: 13px; font-family: var(--mono); background: var(--surface2); border: 1px solid var(--border); min-height: 45px; margin-bottom: 15px; }
    .status-bar.ok { color: var(--success); background: #ecfdf5; }
    .status-bar.err { color: var(--error); background: #fef2f2; }
    #fallback-ui { display: none; padding: 15px; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; margin-top: 10px; }
    .candidate-btn { background: #fff; border: 1px solid var(--border); padding: 8px; border-radius: 6px; margin-top: 5px; display: block; width: 100%; text-align: left; font-family: var(--mono); cursor: pointer; }
    .candidate-btn:hover { background: var(--accent); color: #fff; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #ccc; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <div style="font-family: var(--mono); color: var(--accent); margin-bottom: 15px;">NEXWAH // AUTO-TRIAGE</div>
  
  <div class="video-wrap">
    <video id="video" autoplay playsinline muted></video>
  </div>
  
  <button class="btn btn-primary" onclick="startCamera()">1. START CAMERA</button>
  <button class="btn btn-primary" style="background:#059669" onclick="captureAndProcess()">2. SCAN & AUTO-RESOLVE</button>

  <div id="status" class="status-bar">System Standby...</div>

  <div id="fallback-ui">
    <label style="font-size: 11px; font-weight: bold;">⚠️ AUTO-FAIL: SELECT CORRECT PN</label>
    <div id="candidate-list"></div>
  </div>

  <div class="field">
    <label>Confirmed MFR PN</label>
    <input type="text" id="finalPn" readonly>
  </div>
  <div class="field">
    <label>Auto-Description</label>
    <input type="text" id="finalDesc" readonly>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
const GOOGLE_API_KEY = "AIzaSyBjzZf1DVzZFuaf9tC5SW8x9bjqp1t7HQQ";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzYSqnfI-_n4HObZyrtypdkioVlKIHXUZfqDAYT5mgJ6nWnBU2pfL4EQg_NCqz8w6Gi/exec";

async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
  document.getElementById("video").srcObject = stream;
}

// 🧽 STEP 3: THE CLEANER
function filterNoise(text) {
  const lines = text.split('\n').map(l => l.trim().toUpperCase());
  return lines.filter(l => {
    if (l.length < 5) return false; // Too short
    if (/\d{4}[-/]\d{2}/.test(l)) return false; // Date check
    if (/PO|LOT|QTY|DATE|ROHS|ORDER/.test(l)) return false; // Noise keywords
    if (/^[0-9]+$/.test(l)) return false; // Pure numbers (usually Qty)
    return true;
  });
}

// ⭐ STEP 4: RANKING ENGINE
function getTopCandidates(lines) {
  return lines.map(l => {
    let score = 0;
    if (/[A-Z]/.test(l) && /[0-9]/.test(l)) score += 10; // Alphanumeric mix is good
    if (l.length > 8 && l.length < 18) score += 5; // Standard PN length
    if (l.endsWith("-ND")) score -= 10; // Specifically deprioritize Digikey internal
    return { val: l, score };
  }).sort((a,b) => b.score - a.score).slice(0, 3).map(c => c.val);
}

// 🔁 STEP 5 & 8: AUTO-LOOP / CHECKER
async function checkInventory(pn) {
  // Currently "Silently checking"
  // Later: replace this with your actual DB search logic
  try {
    const resp = await fetch(`${SCRIPT_URL}?action=read&sheet=Inventory`);
    const data = await resp.json();
    return data.find(row => row[2].toUpperCase() === pn.toUpperCase());
  } catch(e) { return null; }
}

async function captureAndProcess() {
  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  
  const base64 = canvas.toDataURL("image/jpeg", 0.8).split(',')[1];
  document.getElementById("fallback-ui").style.display = "none";
  updateStatus('<span class="spinner"></span>Step 2: OCR Extraction...', "loading");

  try {
    // 🧠 STEP 2: GOOGLE VISION
    const gResp = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`, {
      method: "POST",
      body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: "TEXT_DETECTION" }] }] })
    });
    const gData = await gResp.json();
    const fullText = gData.responses[0].textAnnotations[0].description;

    // 🧹 STEP 3: FILTER
    const cleanLines = filterNoise(fullText);
    
    // ⭐ STEP 4: PICK TOP 3
    const candidates = getTopCandidates(cleanLines);
    if(candidates.length === 0) throw new Error("No candidates found");

    // 🔥 STEP 5: SILENT AUTO-LOOP
    updateStatus('<span class="spinner"></span>Step 5: Silent Auto-Checking...', "loading");
    let match = null;
    for(let pn of candidates) {
      match = await checkInventory(pn);
      if(match) {
        finishFlow(match[2], match[3]); // match[2]=MfrPN, match[3]=Desc
        return;
      }
    }

    // 👤 STEP 6: FALLBACK (If all failed)
    showFallback(candidates, fullText);

  } catch(e) {
    updateStatus("❌ Error: " + e.message, "err");
  }
}

function showFallback(candidates, raw) {
  updateStatus("🔴 All Auto-Checks Failed", "err");
  const ui = document.getElementById("fallback-ui");
  const list = document.getElementById("candidate-list");
  ui.style.display = "block";
  list.innerHTML = "";
  
  candidates.forEach(pn => {
    const btn = document.createElement("button");
    btn.className = "candidate-btn";
    btn.innerText = pn;
    btn.onclick = () => {
      // 🔁 STEP 8: RE-RUN WITH SELECTION
      finishFlow(pn, "Manual Selection");
    };
    list.appendChild(btn);
  });
}

function finishFlow(pn, desc) {
  document.getElementById("finalPn").value = pn;
  document.getElementById("finalDesc").value = desc;
  document.getElementById("fallback-ui").style.display = "none";
  updateStatus("🟢 Flow Complete: " + pn, "ok");
}

function updateStatus(m, c) {
  const s = document.getElementById("status");
  s.innerHTML = m;
  s.className = "status-bar " + c;
}
</script>
</body>
</html>
