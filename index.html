<script src="https://unpkg.com/html5-qrcode"></script>

<script>
let mode = "";
let html5QrCode;
let scanned = false;
let lastScanTime = 0;

let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

function openScanner(m) {
    mode = m;
    scanned = false;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 20, // 🔥 faster scanning
        qrbox: { width: 280, height: 120 },
        aspectRatio: 1.7778,
        disableFlip: false,
        experimentalFeatures: {
            useBarCodeDetectorIfSupported: true
        },
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: "continuous" // 🔥 auto focus
        }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,

        (decodedText) => {
            let now = Date.now();

            // 🔥 ANTI-SPAM (prevent multiple triggers)
            if (now - lastScanTime < 1500) return;
            lastScanTime = now;

            if (scanned) return;
            scanned = true;

            if (navigator.vibrate) navigator.vibrate(100);

            document.getElementById("status").innerText = "✅ DETECTED: " + decodedText;

            processData(decodedText);
        },

        () => {
            // silent errors (normal)
        }

    ).catch(err => alert(err));
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS
function processData(text) {

    let pn = text.trim();

    if (pn.startsWith("1P")) pn = pn.substring(2);
    else if (pn.startsWith("P")) pn = pn.substring(1);

    setTimeout(() => {

        html5QrCode.stop().then(() => {

            if (inventory[pn]) {

                let qty = prompt(
                    `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
                    "1"
                );

                if (qty) {
                    if (mode === "add") inventory[pn].qty += parseInt(qty);
                    else inventory[pn].qty -= parseInt(qty);
                }

            } else {

                if (mode === "add") {
                    let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

                    inventory[pn] = {
                        desc: desc || "No Desc",
                        qty: 1
                    };
                } else {
                    alert("❌ Part not found!");
                }
            }

            localStorage.setItem("full_inv", JSON.stringify(inventory));
            location.reload();

        });

    }, 500);
}
</script>
