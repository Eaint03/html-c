<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        button { 
            width: 90%; max-width: 350px; padding: 16px; margin: 10px 0; 
            border-radius: 12px; border: none; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-main { background: var(--blue); color: white; }
        .btn-secondary { background: #333; color: white; }
        .btn-danger { background: var(--red); color: white; }

        #reader-container { 
            position: relative; width: 100%; max-width: 400px; 
            margin: 15px auto; border-radius: 15px; overflow: hidden; border: 2px solid #333;
        }
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60px; border: 3px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6); z-index: 5; pointer-events: none;
        }

        #status { margin: 10px; color: #00ff00; font-weight: bold; height: 20px; }
        #debugCanvas { width: 100%; max-width: 350px; background: white; border-radius: 8px; margin-top: 10px; border: 1px solid #555; }
    </style>
</head>
<body>

    <div id="homePage" class="page">
        <h1 style="margin-top: 40px;">📦 Smart Inventory</h1>
        <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Scan to ADD</button>
        <button class="btn-secondary" onclick="goTo('scanPage', 'take')">➖ Scan to REMOVE</button>
    </div>

    <div id="scanPage" class="page hidden">
        <h2 id="modeTitle">Scanning...</h2>
        <div id="status">Initializing...</div>

        <div id="reader-container">
            <div id="reader"></div>
            <div id="scanner-overlay"></div>
        </div>

        <button class="btn-danger" onclick="goTo('homePage')">Exit Scanner</button>
        <p style="font-size: 10px; color: #666;">AI VIEW (UPSCALED):</p>
        <canvas id="debugCanvas"></canvas>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";
        
        let mode = "";
        let html5QrCode = null;
        let scanTimer = null;
        let processing = false;

        function goTo(pageId, m = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');

            if (pageId === 'scanPage') {
                mode = m;
                document.getElementById('modeTitle').innerText = (m === 'add' ? "Add Stock" : "Remove Stock");
                initScanner();
            } else {
                killScanner();
            }
        }

        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            try {
                // High FPS for faster detection
                await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {});
                document.getElementById("status").innerText = "Searching for Part Number...";
                scanTimer = setInterval(takeStep, 1000); 
            } catch (e) { alert(e); }
        }

        function killScanner() {
            clearInterval(scanTimer);
            if (html5QrCode) html5QrCode.stop().catch(() => {});
        }

        async function takeStep() {
            if (processing) return;
            const video = document.querySelector("#reader video");
            if (!video || video.readyState < 2) return;

            processing = true;
            const canvas = document.getElementById("debugCanvas");
            const ctx = canvas.getContext("2d");

            const vW = video.videoWidth; const vH = video.videoHeight;
            const cropW = vW * 0.85; const cropH = vH * 0.2;
            const sx = (vW - cropW) / 2; const sy = (vH - cropH) / 2;

            // SMART VISION: Upscale the image to 1000px wide for easier OCR reading
            canvas.width = 1000; canvas.height = 200;
            
            // SUPER CONTRAST: Force text to be pure black/white
            ctx.filter = 'grayscale(1) contrast(5) brightness(1.5) blur(0px)';
            ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                const res = await Tesseract.recognize(blob, 'eng', { 
                    tessedit_pageseg_mode: 7,
                    // WHITELIST: Only look for P/N characters
                    tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-'
                });

                const text = res.data.text.trim().replace(/\s/g, ""); 
                const found = text.match(/[A-Z0-9-]{4,}/g);
                
                if (found) {
                    const pn = found.reduce((a, b) => a.length > b.length ? a : b);
                    document.getElementById("status").innerText = "FOUND: " + pn;
                    
                    setTimeout(async () => {
                        const q = prompt(`Part: ${pn}\nQuantity:`, "1");
                        if (q) {
                            document.getElementById("status").innerText = "Sending to Sheet...";
                            const payload = [{ 
                                pn: pn, 
                                qty: parseInt(q), 
                                mode: mode, 
                                date: new Date().toLocaleString() 
                            }];
                            
                            try {
                                await fetch(SCRIPT_URL, { 
                                    method: "POST", 
                                    mode: "no-cors", 
                                    body: JSON.stringify(payload) 
                                });
                                document.getElementById("status").innerText = "✅ Saved!";
                                setTimeout(() => { document.getElementById("status").innerText = "Searching..."; }, 2000);
                            } catch (e) {
                                alert("Sync Error");
                            }
                        }
                        processing = false;
                    }, 50); // Faster prompt trigger
                } else { 
                    processing = false; 
                }
            }, "image/jpeg", 0.95);
        }
    </script>
</body>
</html>
