<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pro Inventory - Ultra Accuracy</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
:root { --blue: #007bff; --green: #28a745; --dark: #121212; }
body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; text-align: center; }

.page { padding: 20px; display: flex; flex-direction: column; align-items: center; }
.hidden { display: none !important; }

button { width:95%; max-width:380px; padding:20px; margin:10px 0; border-radius:15px; font-size:18px; font-weight:bold; }
.btn-main { background: var(--blue); color: white; }
.btn-capture { background: var(--green); font-size:24px; }

#reader-container { position:relative; width:100%; max-width:400px; border-radius:20px; overflow:hidden; border:3px solid #444; }

#scanner-overlay {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:90%; height:35px; border:3px solid #00ff00;
    box-shadow:0 0 0 1000px rgba(0,0,0,0.85);
}

#status { margin:15px; color:#00ff00; font-size:1.3rem; }
#debugCanvas { width:95%; max-width:380px; background:white; margin-top:10px; }
</style>
</head>

<body>

<div id="homePage" class="page">
<h1>📦 Scan</h1>
<button onclick="goTo('scanPage','add')">Add</button>
<button onclick="goTo('scanPage','take')">Remove</button>
</div>

<div id="scanPage" class="page hidden">
<h2>Scanning...</h2>
<div id="status">Ready</div>

<div id="reader-container">
<div id="reader"></div>
<div id="scanner-overlay"></div>
</div>

<button onclick="captureAndScan()">📸 CAPTURE</button>
<button onclick="goTo('homePage')">Exit</button>

<!-- 🔥 ZOOM SLIDER -->
<input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="2"
style="width:90%; margin-top:10px;">

<canvas id="debugCanvas"></canvas>
</div>

<script>
let html5QrCode, processing=false, mode="";

function goTo(p,m=""){
document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));
document.getElementById(p).classList.remove('hidden');
mode=m;initScanner();
}

async function initScanner(){
html5QrCode=new Html5Qrcode("reader");
await html5QrCode.start(
{ facingMode:{exact:"environment"} },
{
fps:15,
videoConstraints:{focusMode:"continuous"}
},
()=>{}
);

// 🔥 AUTO ZOOM
setTimeout(async ()=>{
try{
const track=html5QrCode.getRunningTrack();
await track.applyConstraints({advanced:[{zoom:2}]});
}catch(e){}
},500);
}

async function captureAndScan(){
if(processing)return;
processing=true;

const video=document.querySelector("#reader video");
const canvas=document.getElementById("debugCanvas");
const ctx=canvas.getContext("2d");
const status=document.getElementById("status");

const vW=video.videoWidth,vH=video.videoHeight;
const cropW=vW*0.88,cropH=vH*0.07;
const sx=(vW-cropW)/2,sy=(vH-cropH)/2;

canvas.width=3000;
canvas.height=300;

const filters=[
'grayscale(1) contrast(4) brightness(1.4)',
'grayscale(1) contrast(6) brightness(1.3)',
'grayscale(1) contrast(8) brightness(1.2)',
'grayscale(1) contrast(10) brightness(1.1)',
'grayscale(1) contrast(12) brightness(1.0)'
];

let allReads=[];

for(let f of filters){
ctx.filter=f;
ctx.drawImage(video,sx,sy,cropW,cropH,0,0,canvas.width,canvas.height);

const res=await Tesseract.recognize(canvas,'eng',{
tessedit_pageseg_mode:7,
tessedit_char_whitelist:'0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-.,'
});

let text="";
res.data.symbols.forEach(sym=>{
if(sym.confidence>40) text+=sym.text;
});

text=text.replace(/\s/g,'');
if(text.length>5) allReads.push(text);
}

function getBestConsensus(reads){
if(reads.length===0)return null;
let best=reads[0],bestScore=0;

reads.forEach(r=>{
let score=0;
reads.forEach(o=>{
for(let i=0;i<Math.min(r.length,o.length);i++){
if(r[i]===o[i]) score++;
}
});
if(score>bestScore){bestScore=score;best=r;}
});
return best;
}

let pn=getBestConsensus(allReads);

status.innerText = pn ? "🎯 "+pn : "❌ fail";
processing=false;
}

// 🔥 ZOOM CONTROL
document.addEventListener("DOMContentLoaded",()=>{
const slider=document.getElementById("zoomSlider");

slider.addEventListener("input",async()=>{
try{
const track=html5QrCode.getRunningTrack();
await track.applyConstraints({
advanced:[{zoom:parseFloat(slider.value)}]
});
}catch(e){}
});
});
</script>

</body>
</html>
