<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Industrial Precision Scanner v4</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; overflow: hidden; }
        .page { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        button { 
            width: 95%; max-width: 380px; padding: 16px; margin: 6px 0; 
            border-radius: 12px; border: none; font-size: 17px; font-weight: bold; 
            cursor: pointer; 
        }
        .btn-main { background: var(--blue); color: white; }
        .btn-capture { 
            background: var(--green); color: white; font-size: 22px; 
            border: 3px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-top: 5px;
        }

        #reader-container { 
            position: relative; width: 100%; max-width: 380px; 
            margin: 5px auto; border-radius: 15px; overflow: hidden; border: 2px solid #444;
            background: #000; touch-action: none;
        }

        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; height: 35px; border: 2px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.8); z-index: 5; pointer-events: none;
        }

        #status { margin: 8px; color: #00ff00; font-weight: bold; font-size: 1.1rem; min-height: 25px; }
        
        #debugCanvas { 
            width: 90%; max-width: 340px; background: white; border-radius: 8px; 
            display: block; margin: 5px auto; border: 1px solid #555;
            image-rendering: pixelated; 
        }
    </style>
</head>

<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 Inventory System</h1>
    <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
    <button class="btn-main" style="background:#333;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Ready (Tap to Focus)</div>

    <div id="reader-container" onclick="manualFocus()">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>

    <button class="btn-capture" onclick="captureAndScan()">📸 CAPTURE & SAVE</button>
    <button style="background:#cc0000; color:white; padding: 12px;" onclick="goTo('homePage')">Exit</button>
    
    <canvas id="debugCanvas"></canvas>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzi3CrAiNVWJlLnR0GpUkf5r054s9AGYq3ygw0Xl7xFEFH-hh8SKm5l8hBaMAh5bv_5/exec";

let mode = "";
let html5QrCode = null;
let processing = false;

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    try {
        await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {});
    } catch (e) { alert(e); }
}

async function manualFocus() {
    const video = document.querySelector("#reader video");
    if (!video) return;
    const track = video.srcObject.getVideoTracks()[0];
    const capabilities = track.getCapabilities();
    document.getElementById("status").innerText = "⚡ Focusing...";
    if (capabilities.focusMode) {
        try {
            await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
            setTimeout(() => { document.getElementById("status").innerText = "Focused! 🎯"; }, 500);
        } catch (err) { document.getElementById("status").innerText = "Ready"; }
    }
}

function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    if (navigator.vibrate) navigator.vibrate(80);
    const status = document.getElementById("status");
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");

    status.innerText = "⏳ Cleaning Geometry...";

    const vW = video.videoWidth;
    const vH = video.videoHeight;
    const cropW = vW * 0.88;
    const cropH = vH * 0.07;
    const sx = (vW - cropW) / 2;
    const sy = (vH - cropH) / 2;

    canvas.width = 3000;
    canvas.height = 300;
    ctx.imageSmoothingEnabled = false;

    // 🔥 DYNAMIC FILTERING: Stronger contrast to separate 0/C and 5/S
    // We use a specific brightness boost to keep the gaps in 'C' and 'S' white
    ctx.filter = 'grayscale(1) contrast(90) brightness(1.2)';
    ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

    try {
        const res = await Tesseract.recognize(canvas, 'eng', {
            tessedit_pageseg_mode: 7,
            tessedit_char_whitelist: '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ-'
        });

        let rawText = res.data.text.trim().replace(/\s/g, "");
        
        // 🧠 INDUSTRIAL LOGIC REPAIR
        let pn = rawText.toUpperCase()
                    .replace(/O/g, "0")       // O to 0 (Most common fix)
                    .replace(/[\|\[\]I!l]/g, "1") // All vertical sticks to 1
                    .replace(/B/g, "8")       // Common loop error
                    .replace(/S/g, "5");      // On electronics labels, S is often 5

        if (pn.length >= 4) {
            status.innerText = "🎯 MATCH: " + pn;
            const q = prompt(`Quantity for:\n${pn}`, "1");
            if (q && !isNaN(q)) {
                status.innerText = "🚀 Syncing...";
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors", 
                    body: JSON.stringify([{ pn: pn, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() }])
                });
                status.innerText = "✅ Saved!";
                setTimeout(() => status.innerText = "Ready", 2000);
            }
        } else {
            status.innerText = "❌ Geometry Error. Retap Focus.";
        }
    } catch (err) { status.innerText = "Error reading."; }
    processing = false;
}
</script>
</body>
</html>
