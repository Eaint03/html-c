<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            margin-top: 50px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            font-size: 16px;
        }

        .hidden {
            display: none;
        }

        /* CAMERA FULL SCREEN */
        #addPage {
            position: relative;
            width: 100%;
            height: 100vh;
            background: black;
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* CAPTURE BUTTON */
        .capture-container {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
        }

        .capture-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: 5px solid #ccc;
        }

        .capture-btn::after {
            content: '';
            width: 60px;
            height: 60px;
            background: #4CAF50;
            display: block;
            border-radius: 50%;
            margin: auto;
        }

        /* TOP BUTTONS */
        .top-buttons {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px;
        }

        .top-buttons button {
            width: auto;
            padding: 10px 15px;
            background: rgba(0,0,0,0.6);
        }
    </style>
</head>

<body>

<h1 id="homeTitle">Welcome to smart Inventory System</h1>

<!-- HOME -->
<div class="container" id="home">
    <h3>Select Action</h3>

    <button onclick="goToAdd()">➕ Add Inventory</button>
    <button onclick="goToTake()">📤 Take Inventory</button>
</div>

<!-- ADD PAGE -->
<div class="hidden" id="addPage">

    <video id="camera" autoplay></video>

    <!-- TOP BUTTONS -->
    <div class="top-buttons">
        <button onclick="startCamera()">Start</button>
        <button onclick="goHome()">Back</button>
    </div>

    <!-- CAPTURE BUTTON -->
    <div class="capture-container">
        <button class="capture-btn" onclick="takePhoto()"></button>
    </div>

</div>

<!-- TAKE PAGE -->
<div class="container hidden" id="takePage">
    <h3>📤 Take Inventory</h3>
    <button onclick="goHome()">Back</button>
</div>

<script>

let video = document.getElementById("camera");
let stream = null;

// NAVIGATION
function goToAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("homeTitle").classList.add("hidden");
    document.getElementById("addPage").classList.remove("hidden");
}

function goToTake() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("homeTitle").classList.add("hidden");
    document.getElementById("takePage").classList.remove("hidden");
}

function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("homeTitle").classList.remove("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");

    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
}

// START CAMERA (BACK CAMERA)
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" }
        });
        video.srcObject = stream;
    } catch (err) {
        alert("Camera error: " + err.message);
    }
}

// TAKE PHOTO
function takePhoto() {

    if (!stream) {
        alert("Start camera first");
        return;
    }

    let canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    let ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(async function(blob) {

        let reader = new FileReader();

        reader.onload = async function() {

            let base64 = reader.result.split(',')[1];

            let response = await fetch(
                "https://vision.googleapis.com/v1/images:annotate?key=YOUR_API_KEY",
                {
                    method: "POST",
                    body: JSON.stringify({
                        requests: [
                            {
                                image: { content: base64 },
                                features: [{ type: "TEXT_DETECTION" }]
                            }
                        ]
                    })
                }
            );

            let result = await response.json();

            if (!result.responses || !result.responses[0].fullTextAnnotation) {
                alert("❌ No text detected");
                return;
            }

            let text = result.responses[0].fullTextAnnotation.text;

            console.log(text);

            // EXTRACT
            let component = "";
            let quantity = 1;

            let descMatch = text.match(/Desc[:\s]*(.*)/i);
            if (descMatch) component = descMatch[1];

            let qtyMatch = text.match(/Quantity[:\s]*(\d+)/i);
            if (qtyMatch) quantity = parseInt(qtyMatch[1]);

            // SAVE
            await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
                method: "POST",
                body: JSON.stringify({
                    component: component,
                    quantity: quantity,
                    location: ""
                })
            });

            alert("✅ Saved!\n" + component + "\nQty: " + quantity);
        };

        reader.readAsDataURL(blob);

    }, "image/jpeg");
}

</script>

</body>
</html>
