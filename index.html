<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Smart Inventory</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f4f4f9; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        button { padding: 15px; margin: 10px; font-size: 16px; cursor: pointer; border-radius: 8px; border: 1px solid #ddd; width: 80%; }
        .hidden { display: none; }
        
        /* Scanner Viewport */
        #scanner { 
            width: 100%; 
            max-width: 400px; 
            height: 300px; 
            margin: auto; 
            background: #000; 
            border: 4px solid #333; 
            border-radius: 12px;
            overflow: hidden;
        }

        .box { border: 1px solid #ccc; padding: 15px; margin-top: 10px; background: white; border-radius: 8px; text-align: left; }
        input { padding: 12px; margin: 5px; width: 85%; border: 1px solid #ccc; border-radius: 5px; }
        h2 { color: #333; }
    </style>
</head>

<body>

<div class="container">
    <h2>📦 Smart Inventory</h2>

    <div id="homePage">
        <button onclick="goTo('addPage')" style="background: #e1f5fe;">➕ Add Inventory</button>
        <button onclick="goTo('takePage')" style="background: #fff3e0;">➖ Take Inventory</button>
        <button onclick="showInventory()">📋 View Inventory List</button>
    </div>

    <div id="addPage" class="hidden">
        <h3>Scanning to ADD...</h3>
        <button onclick="goHome()" style="background: #ffcdd2;">⬅ Cancel / Back</button>
        <div id="scanner"></div>
        <p id="statusAdd">Point camera at P/N barcode</p>

        <div id="formBox" class="hidden">
            <input id="name" placeholder="Component Name"><br>
            <input id="qty" type="number" placeholder="Initial Quantity" value="1"><br>
            <input id="location" placeholder="Bin Location"><br>
            <button onclick="saveNewItem()" style="background: #4caf50; color: white;">💾 Save New Part</button>
        </div>
    </div>

    <div id="takePage" class="hidden">
        <h3>Scanning to TAKE...</h3>
        <button onclick="goHome()" style="background: #ffcdd2;">⬅ Cancel / Back</button>
        <div id="scanner-take" style="width:100%; max-width:400px; margin:auto; border:4px solid #333; border-radius:12px;"></div>
        <p id="statusTake">Point camera at P/N barcode</p>
    </div>

    <div id="inventoryBox"></div>
</div>

<script>
let mode = "";
let currentCode = "";
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};
let html5QrCode;

function saveData() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

// Navigation Logic
function goTo(page) {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
    document.getElementById(page).classList.remove("hidden");
    
    if(page === 'addPage') startScanner('add', "scanner");
    if(page === 'takePage') startScanner('take', "scanner-take");
}

function goHome() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => {
            location.reload(); // Hard reset ensures camera release
        }).catch(() => {
            location.reload();
        });
    } else {
        location.reload();
    }
}

// Strips '1P' or 'P' from Mouser/DigiKey barcodes
function cleanPartNumber(rawCode) {
    let clean = rawCode.trim();
    if (clean.startsWith("1P")) return clean.substring(2);
    if (clean.startsWith("P"))  return clean.substring(1);
    if (clean.startsWith("K"))  return clean.substring(1);
    return clean;
}

// 🔥 INSTANT SCANNER ENGINE
function startScanner(m, elementId) {
    mode = m;
    html5QrCode = new Html5Qrcode(elementId);

    const config = { 
        fps: 30, // Fast processing
        qrbox: { width: 320, height: 150 }, // Narrow for P/N barcodes
        aspectRatio: 1.0
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config,
        (decodedText) => {
            // SUCCESS: Triggers the moment it sees the barcode
            const finalPN = cleanPartNumber(decodedText);
            
            // Haptic feedback (vibrate)
            if (navigator.vibrate) navigator.vibrate(100);

            html5QrCode.stop().then(() => {
                currentCode = finalPN;
                handleScan(finalPN);
            });
        }
    ).catch(err => {
        alert("Camera Error: Please ensure you are using HTTPS on GitHub Pages.");
    });
}

function handleScan(code) {
    if (inventory[code]) {
        let item = inventory[code];
        let promptMsg = (mode === 'add' ? "Add to " : "Take from ") + item.name + "\nStock: " + item.qty;
        let change = prompt(promptMsg, "1");
        
        if (change && !isNaN(change)) {
            let val = parseInt(change);
            inventory[code].qty += (mode === 'add' ? val : -val);
            saveData();
            alert("Inventory Updated!");
            location.reload();
        }
    } else {
        if (mode === "add") {
            document.getElementById("formBox").classList.remove("hidden");
            document.getElementById("name").value = code;
            alert("New P/N Detected: " + code);
        } else {
            alert("Part Number '" + code + "' not found in inventory.");
            location.reload();
        }
    }
}

function saveNewItem() {
    let name = document.getElementById("name").value;
    let qty = parseInt(document.getElementById("qty").value);
    let location = document.getElementById("location").value;

    if (name) {
        inventory[currentCode] = { name, qty, location };
        saveData();
        alert("New Part Saved!");
        window.location.reload();
    }
}

function showInventory() {
    let html = "<h3>📦 Inventory List</h3>";
    let keys = Object.keys(inventory);
    if (keys.length === 0) html += "<p>No items found.</p>";
    
    keys.forEach(code => {
        let item = inventory[code];
        html += `<div class="box"><b>${item.name}</b><br><small>PN: ${code}</small><br>Qty: ${item.qty}</div>`;
    });
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>

</body>
</html>
