<!DOCTYPE html>
<html>
<head>
    <title>📦 Smart Inventory</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 20px;
        }

        button {
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        #scanner {
            margin: auto;
            width: 100%;
            max-width: 400px;
        }

        input {
            padding: 10px;
            margin: 5px;
            width: 80%;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h2>📦 Smart Inventory System</h2>

<!-- 🏠 HOME PAGE -->
<div id="homePage">
    <h3>🏠 Home</h3>
    <button onclick="goTo('addPage')">➕ Add Inventory</button>
    <button onclick="goTo('takePage')">➖ Take Inventory</button>
    <button onclick="showInventory()">📋 View Inventory</button>
</div>

<!-- ➕ ADD PAGE -->
<div id="addPage" class="hidden">
    <h3>➕ Add Inventory</h3>
    <button onclick="goHome()">⬅ Back</button>
    <button onclick="startScanner('add')">📷 Scan Barcode</button>

    <div id="scanner"></div>
    <p>Code: <b id="resultAdd">None</b></p>

    <div id="formBox" class="hidden">
        <input id="name" placeholder="Component Name"><br>
        <input id="qty" type="number" placeholder="Quantity"><br>
        <input id="location" placeholder="Location"><br>
        <button onclick="saveNewItem()">💾 Save</button>
    </div>
</div>

<!-- ➖ TAKE PAGE -->
<div id="takePage" class="hidden">
    <h3>➖ Take Inventory</h3>
    <button onclick="goHome()">⬅ Back</button>
    <button onclick="startScanner('take')">📷 Scan Barcode</button>

    <div id="scanner"></div>
    <p>Code: <b id="resultTake">None</b></p>
</div>

<!-- INVENTORY VIEW -->
<div id="inventoryBox"></div>

<script>
let mode = "";
let currentCode = "";
let inventory = JSON.parse(localStorage.getItem("inventory")) || {};

function saveData() {
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

// NAVIGATION
function goTo(page) {
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");

    document.getElementById(page).classList.remove("hidden");
}

function goHome() {
    document.getElementById("homePage").classList.remove("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
}

// SCANNER
function startScanner(m) {
    mode = m;

    Quagga.init({
        inputStream: {
            type: "LiveStream",
            target: document.querySelector('#scanner'),
            constraints: { facingMode: "environment" }
        },
        decoder: {
            readers: ["code_128_reader", "ean_reader"]
        }
    }, function(err) {
        if (err) {
            alert("Camera error");
            return;
        }
        Quagga.start();
    });

    Quagga.onDetected(function(data) {
        let code = data.codeResult.code;
        currentCode = code;

        if (mode === "add") {
            document.getElementById("resultAdd").innerText = code;
        } else {
            document.getElementById("resultTake").innerText = code;
        }

        Quagga.stop();
        handleScan(code);
    });
}

// LOGIC
function handleScan(code) {

    if (inventory[code]) {
        let item = inventory[code];

        if (mode === "add") {
            let addQty = prompt(`ADD\n${item.name}\nCurrent: ${item.qty}`);

            if (addQty) {
                item.qty += parseInt(addQty);
                saveData();
                alert("Updated!");
            }

        } else {
            let takeQty = prompt(`TAKE\n${item.name}\nCurrent: ${item.qty}`);

            if (takeQty > item.qty) {
                alert("Not enough stock!");
                return;
            }

            if (takeQty) {
                item.qty -= parseInt(takeQty);
                saveData();
                alert("Updated!");
            }
        }

    } else {
        if (mode === "add") {
            document.getElementById("formBox").classList.remove("hidden");
        } else {
            alert("Item not found!");
        }
    }
}

// SAVE NEW
function saveNewItem() {
    let name = document.getElementById("name").value;
    let qty = parseInt(document.getElementById("qty").value);
    let location = document.getElementById("location").value;

    inventory[currentCode] = { name, qty, location };
    saveData();

    alert("Saved!");
    document.getElementById("formBox").classList.add("hidden");
}

// VIEW
function showInventory() {
    let html = "<h3>📋 Inventory</h3>";

    for (let code in inventory) {
        let item = inventory[code];
        html += `
            <div class="box">
                <b>${item.name}</b><br>
                Code: ${code}<br>
                Qty: ${item.qty}<br>
                Location: ${item.location}
            </div>
        `;
    }

    document.getElementById("inventoryBox").innerHTML = html;
}
</script>

</body>
</html>
