<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aggressive MFR Scanner v30</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --blue:#007bff; --green:#28a745; --dark:#121212; }
body { font-family:-apple-system; background:var(--dark); color:white; margin:0; text-align:center;}
.page { padding:10px; display:flex; flex-direction:column; align-items:center; min-height:100vh;}
.hidden { display:none!important;}
button { width:95%; max-width:380px; padding:18px; margin:6px 0; border-radius:12px; border:none; font-size:18px; font-weight:bold;}
#reader-container { position:relative; width:100%; max-width:380px; border-radius:15px; overflow:hidden; border:2px solid #444;}
#scanner-overlay { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:90%; height:240px; border:3px solid #00ff00; box-shadow:0 0 0 1000px rgba(0,0,0,0.7);}
#result-card { background:#1e1e1e; padding:20px; border-radius:15px; width:90%; max-width:380px; margin-top:15px; text-align:left;}
.input-group { margin-bottom:12px;}
label { color:#888; font-size:0.7rem;}
input { width:100%; background:#2a2a2a; border:1px solid #444; color:white; padding:12px; border-radius:8px; font-family:monospace;}
#status { margin:10px; color:#00ff00;}
</style>
</head>

<body>

<div id="homePage" class="page">
<h1>📦 AI Scanner v30</h1>
<button style="background:var(--blue)" onclick="goTo('scanPage','add')">➕ INCOMING</button>
<button style="background:#333" onclick="goTo('scanPage','take')">➖ OUTGOING</button>
</div>

<div id="scanPage" class="page hidden">
<div id="status">Ready</div>

<div id="reader-container">
<div id="reader"></div>
<div id="scanner-overlay"></div>
</div>

<button id="capBtn" style="background:var(--blue)" onclick="captureAndScan()">📸 CAPTURE</button>

<div id="result-area" class="hidden">
<div id="result-card">

<div class="input-group">
<label>Manufacturer Part Number</label>
<input id="resPN">
</div>

<div class="input-group">
<label>Description</label>
<input id="resDesc">
</div>

<div class="input-group">
<label>Quantity</label>
<input type="number" id="resQty" value="1">
</div>

<button style="background:var(--green)" onclick="syncToSheet()">🚀 SAVE</button>
<button onclick="resetScan()">Try Again</button>

</div>
</div>

<button onclick="goTo('homePage')">Exit</button>
<canvas id="debugCanvas" class="hidden"></canvas>
</div>

<script>

const GOOGLE_API_KEY = "YOUR_KEY";
const SCRIPT_URL = "YOUR_SCRIPT";

let html5QrCode;
let processing = false;

// 🔥 FILTER ENGINE (FIXED)
function normalize(t){
    return t.toUpperCase().trim()
        .replace(/O/g,'0')
        .replace(/I/g,'1')
        .replace(/S/g,'5');
}

function rejectJunk(t){
    const bad = ["DATE","LOT","QTY","ROHS","PO","ORDER","CUSTOMER","LPN"];

    for(let b of bad){
        if(t.includes(b)) return true;
    }

    if(/^\d+$/.test(t)) return true;
    if(/^\d{4}[-/]\d{2}[-/]\d{2}$/.test(t)) return true;
    if(t.length < 6) return true;

    return false;
}

function isValid(t){
    return (
        t.length>=6 &&
        t.length<=25 &&
        /^[A-Z0-9\-]+$/.test(t) &&
        /[A-Z]/.test(t) &&
        /[0-9]/.test(t)
    );
}

function score(t){
    let s=0;
    if(/[A-Z]/.test(t)&&/[0-9]/.test(t)) s+=5;
    if(t.length>=8&&t.length<=16) s+=3;
    if((t.match(/-/g)||[]).length>2) s-=3;
    if(/^\d/.test(t)) s-=2;
    return s;
}

function getBestPN(text){
    const lines = text.split('\n')
        .map(normalize)
        .filter(l=>!rejectJunk(l))
        .filter(l=>isValid(l));

    const ranked = lines.sort((a,b)=>score(b)-score(a));
    return ranked[0] || "";
}

// 🔧 UI
function goTo(id,m=""){
    document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
    if(id==="scanPage"){ initScanner(); resetScan(); }
}

async function initScanner(){
    html5QrCode = new Html5Qrcode("reader");
    await html5QrCode.start({facingMode:"environment"},{fps:20},()=>{});
}

function resetScan(){
    processing=false;
    document.getElementById("status").innerText="Ready";
    document.getElementById("result-area").classList.add("hidden");
    document.getElementById("capBtn").classList.remove("hidden");
}

async function captureAndScan(){
    if(processing) return;
    processing=true;

    const video=document.querySelector("#reader video");
    const canvas=document.getElementById("debugCanvas");
    const ctx=canvas.getContext("2d");

    canvas.width=2000;
    canvas.height=2000;

    ctx.drawImage(video,0,0,2000,2000);

    const base64=canvas.toDataURL().split(',')[1];

    document.getElementById("status").innerText="Scanning...";

    try{
        const res=await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`,{
            method:"POST",
            body:JSON.stringify({
                requests:[{
                    image:{content:base64},
                    features:[{type:"TEXT_DETECTION"}]
                }]
            })
        });

        const data=await res.json();
        const text=data.responses[0].textAnnotations[0].description;

        const clean=text.replace(/[^A-Za-z0-9\-\n]/g," ");

        const pn=getBestPN(clean);

        document.getElementById("resPN").value=pn;
        document.getElementById("status").innerText="Done";

        document.getElementById("result-area").classList.remove("hidden");
        document.getElementById("capBtn").classList.add("hidden");

    }catch(e){
        document.getElementById("status").innerText="Scan failed";
        processing=false;
    }
}

async function syncToSheet(){
    const pn=document.getElementById("resPN").value;
    const desc=document.getElementById("resDesc").value;
    const qty=document.getElementById("resQty").value;

    await fetch(SCRIPT_URL,{
        method:"POST",
        mode:"no-cors",
        body:JSON.stringify([{pn,desc,qty}])
    });

    document.getElementById("status").innerText="Saved";
    setTimeout(resetScan,2000);
}

</script>
</body>
</html>
