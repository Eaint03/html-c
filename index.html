<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📦 Smart Inventory OCR</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
    background: #1a1a1a;
    color: white;
    margin: 0;
}

.container { max-width: 450px; margin: auto; }

button {
    padding: 18px;
    margin: 10px 0;
    font-size: 16px;
    border-radius: 12px;
    width: 90%;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.btn-main { background: #007bff; color: white; }
.hidden { display: none; }

#scanner-wrapper {
    width: 100%;
    height: 350px;
    margin: 15px 0;
    background: black;
    border-radius: 15px;
    overflow: hidden;
}

#status {
    font-size: 16px;
    margin: 10px;
    color: #00ffcc;
    min-height: 24px;
}

.shutter-btn {
    background: white;
    border: 8px solid #555;
    width: 85px;
    height: 85px;
    border-radius: 50%;
    margin: 10px auto;
}

.item-card {
    border: 1px solid #333;
    padding: 15px;
    margin-top: 10px;
    background: #222;
    border-radius: 12px;
    text-align: left;
}
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="homePage">
    <h2>📦 Smart Inventory OCR</h2>
    <button class="btn-main" onclick="openScanner('add')">➕ SCAN TO ADD</button>
    <button class="btn-main" onclick="openScanner('take')" style="background:#fd7e14;">➖ SCAN TO TAKE</button>
    <button class="btn-main" onclick="showInventory()" style="background:#6c757d;">📋 VIEW LIST</button>
</div>

<!-- SCANNER -->
<div id="scanPage" class="hidden">
    <div id="status">📷 ALIGN P/N & TAP</div>

    <div id="scanner-wrapper">
        <div id="reader" style="width:100%;"></div>
    </div>

    <div class="shutter-btn" onclick="captureAndProcess()"></div>

    <button onclick="stopScanner()" style="background:#444;">Cancel</button>
</div>

<!-- INVENTORY -->
<div id="inventoryBox"></div>

</div>

<script>

let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 300, height: 120 },
            videoConstraints: {
                facingMode: "environment",
                width: { ideal: 1920 },
                height: { ideal: 1080 }
            }
        }
    );
}

// STOP CAMERA
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    } else {
        location.reload();
    }
}

// 📸 CAPTURE + OCR
async function captureAndProcess() {

    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const imageFile = await html5QrCode.takePhoto();

        status.innerText = "🧠 Reading P/N...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng',
            {
                logger: m => console.log(m)
            }
        );

        let rawText = result.data.text;

        let pn = cleanPN(rawText);

        if (!pn) {
            status.innerText = "❌ Cannot read P/N";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn);

    } catch (err) {
        status.innerText = "❌ OCR FAILED";
        console.error(err);
    }
}

// 🔥 CLEAN TEXT (IMPORTANT)
function cleanPN(text) {

    let cleaned = text
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9\-]/g, "")
        .toUpperCase();

    // OPTIONAL: filter realistic P/N (length)
    if (cleaned.length < 3) return "";

    return cleaned;
}

// INVENTORY LOGIC
function processData(pn) {

    html5QrCode.stop().then(() => {

        if (inventory[pn]) {

            let qty = prompt(
                `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
                "1"
            );

            if (qty) {
                if (mode === "add") inventory[pn].qty += parseInt(qty);
                else inventory[pn].qty -= parseInt(qty);
            }

        } else {

            if (mode === "add") {

                let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

                inventory[pn] = {
                    desc: desc || "No Desc",
                    qty: 1
                };

            } else {
                alert("❌ Part not found!");
            }
        }

        localStorage.setItem("full_inv", JSON.stringify(inventory));
        location.reload();

    });
}

// SHOW INVENTORY
function showInventory() {

    let html = "<h3>📋 Stock</h3>";

    for (let pn in inventory) {
        html += `
        <div class="item-card">
            <b>P/N: ${pn}</b><br>
            <small>${inventory[pn].desc}</small><br>
            Qty: ${inventory[pn].qty}
        </div>`;
    }

    document.getElementById("inventoryBox").innerHTML = html;
}

</script>

</body>
</html>
