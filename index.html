<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 Direct P/N Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        button { padding: 18px; margin: 10px 0; font-size: 16px; cursor: pointer; border-radius: 12px; width: 90%; border: none; font-weight: bold; }
        .btn-main { background: #007bff; color: white; }
        .btn-take { background: #fd7e14; color: white; }
        .hidden { display: none; }
        
        #scanner-wrapper { 
            width: 100%; height: 350px; margin: 15px 0; background: #000; 
            border: 3px solid #444; border-radius: 20px; overflow: hidden; position: relative;
        }

        /* SHUTTER BUTTON */
        .shutter-btn { 
            background: white; border: 6px solid #555; 
            width: 80px; height: 80px; border-radius: 50%; 
            margin: 10px auto; cursor: pointer;
        }
        .shutter-btn:active { background: #007bff; transform: scale(0.9); }

        .item-card { border: 1px solid #333; padding: 15px; margin-top: 10px; background: #1e1e1e; border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="homePage">
        <h2>📦 Smart Inventory</h2>
        <button class="btn-main" onclick="openScanner('add')">➕ ADD STOCK</button>
        <button class="btn-main" onclick="openScanner('take')" style="background:#fd7e14;">➖ TAKE STOCK</button>
        <button onclick="showInventory()" style="background:#444; color:white;">📋 VIEW LIST</button>
    </div>

    <div id="scanPage" class="hidden">
        <h3 id="modeText">Scan Barcode</h3>
        <p id="status">Tap button when barcode is centered</p>
        
        <div id="scanner-wrapper">
            <div id="reader" style="width: 100%;"></div>
        </div>
        
        <div class="shutter-btn" onclick="snapAndScan()"></div>
        <p><b>TAP TO CAPTURE</b></p>
        
        <button onclick="location.reload()" style="background:none; color:#777; border:none; text-decoration:underline; margin-top:10px;">Cancel</button>
    </div>

    <div id="inventoryBox"></div>
</div>

<script>
let mode = "";
let inventory = JSON.parse(localStorage.getItem("inventory_v4")) || {};
let html5QrCode;

function openScanner(m) {
    mode = m;
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");
    startCamera();
}

function startCamera() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 30, 
        qrbox: { width: 300, height: 120 },
        videoConstraints: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
    };
    // Start camera - we don't care about the success callback, we use manual trigger
    html5QrCode.start({ facingMode: "environment" }, config, () => {}).catch(err => alert(err));
}

async function snapAndScan() {
    const status = document.getElementById("status");
    status.innerText = "⌛ Scanning...";
    status.style.color = "yellow";

    try {
        // Force the scanner to try and decode the CURRENT frame immediately
        // Note: html5-qrcode's scanFile can take a canvas/blob
        const video = document.querySelector('#reader video');
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        // Use the library to decode the image we just "snapped"
        const result = await html5QrCode.scanFile(canvasToBlob(canvas), true);
        handleResult(result);
    } catch (e) {
        status.innerText = "❌ No barcode found. Try again.";
        status.style.color = "red";
    }
}

// Helper to convert canvas to blob for the scanner
function canvasToBlob(canvas) {
    var dataurl = canvas.toDataURL("image/jpeg");
    var arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1],
        bstr = atob(arr[1]), n = bstr.length, u8arr = new Uint8Array(n);
    while(n--){ u8arr[n] = bstr.charCodeAt(n); }
    return new File([u8arr], "scan.jpg", {type:mime});
}

function handleResult(text) {
    if (navigator.vibrate) navigator.vibrate(100);
    
    // Clean P/N
    let pn = text.trim();
    if (pn.startsWith("1P")) pn = pn.substring(2);
    else if (pn.startsWith("P")) pn = pn.substring(1);

    html5QrCode.stop().then(() => {
        if (inventory[pn]) {
            inventory[pn].qty += (mode === 'add' ? 1 : -1);
        } else {
            if (mode === 'add') {
                inventory[pn] = { qty: 1 };
            } else {
                alert("Part not in stock.");
            }
        }
        localStorage.setItem("inventory_v4", JSON.stringify(inventory));
        location.reload();
    });
}

function showInventory() {
    let html = "<h3>📋 Stock</h3>";
    for (let pn in inventory) {
        html += `<div class="item-card"><b>P/N: ${pn}</b><br>Qty: ${inventory[pn].qty}</div>`;
    }
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>
</body>
</html>
