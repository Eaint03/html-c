<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory OCR</title>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .hidden { display: none; }

        button {
            padding: 15px;
            margin: 10px;
            width: 200px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #007bff;
            color: white;
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: auto;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- HOME -->
<div id="homePage">
    <h1>📦 Smart Inventory</h1>
    <button onclick="openScanner('add')">➕ Add Item</button>
    <button onclick="openScanner('take')">➖ Take Item</button>
</div>

<!-- SCANNER -->
<div id="scanPage" class="hidden">
    <h2>📸 Scan Part Number</h2>

    <div id="reader"></div>

    <button onclick="captureAndProcess()">📸 Capture</button>
    <button onclick="stopScanner()">❌ Cancel</button>

    <p id="status"></p>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 10,
        qrbox: { width: 200, height: 60 },
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        () => {},
        () => {}
    );
}

// 🔥 HARD-CROP + HIGH CONTRAST
function preprocessImage(file) {
    return new Promise((resolve) => {
        const img = new Image();
        img.src = URL.createObjectURL(file);

        img.onload = () => {
            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d");

            // 🔥 ADJUST THIS IF NEEDED
            const cropX = img.width * 0.05;
            const cropY = img.height * 0.35;
            const cropW = img.width * 0.9;
            const cropH = img.height * 0.15;

            canvas.width = 640;
            canvas.height = 120;

            ctx.drawImage(
                img,
                cropX, cropY, cropW, cropH,
                0, 0, canvas.width, canvas.height
            );

            // 🔥 HIGH CONTRAST
            let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;

            for (let i = 0; i < data.length; i += 4) {
                let avg = (data[i] + data[i+1] + data[i+2]) / 3;
                let val = avg > 140 ? 255 : 0;

                data[i] = val;
                data[i+1] = val;
                data[i+2] = val;
            }

            ctx.putImageData(imageData, 0, 0);

            canvas.toBlob(resolve, "image/jpeg");
        };
    });
}

// CAPTURE + OCR
async function captureAndProcess() {
    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const raw = await html5QrCode.takePhoto();

        await html5QrCode.stop();

        const imageFile = await preprocessImage(raw);

        status.innerText = "🧠 Reading Part Number...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng',
            {
                tessedit_pageseg_mode: 7,
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-.,'
            }
        );

        let text = result.data.text;

        console.log("OCR:", text);

        let pn = extractPN(text);

        if (!pn) {
            status.innerText = "❌ OCR Failed";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn);

    } catch (err) {
        status.innerText = "❌ Error";
        console.error(err);
    }
}

// SIMPLE EXTRACT
function extractPN(text) {
    return text
        .replace(/\s+/g, "")
        .replace(/[^A-Z0-9\-,\.]/g, "");
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS
function processData(pn) {

    if (inventory[pn]) {

        let qty = prompt(
            `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
            "1"
        );

        if (qty) {
            if (mode === "add") inventory[pn].qty += parseInt(qty);
            else inventory[pn].qty -= parseInt(qty);
        }

    } else {

        if (mode === "add") {
            let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

            inventory[pn] = {
                desc: desc || "No Desc",
                qty: 1
            };
        } else {
            alert("❌ Part not found!");
        }
    }

    localStorage.setItem("full_inv", JSON.stringify(inventory));
    location.reload();
}
</script>

</body>
</html>
