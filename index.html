<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📦 Industrial P/N Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #121212; color: white; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        button { padding: 18px; margin: 10px 0; font-size: 16px; cursor: pointer; border-radius: 12px; width: 90%; border: none; font-weight: bold; transition: 0.1s; }
        .btn-main { background: #007bff; color: white; }
        .btn-orange { background: #fd7e14; color: white; }
        .hidden { display: none; }
        
        /* Scanner Box */
        #scanner-wrapper { 
            width: 100%; height: 320px; margin: 15px 0; background: #000; 
            border: 3px solid #444; border-radius: 20px; overflow: hidden; position: relative;
        }

        /* SHUTTER BUTTON */
        .shutter-btn { 
            background: white; border: 8px solid #333; 
            width: 80px; height: 80px; border-radius: 50%; 
            margin: 10px auto; cursor: pointer; box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }
        .shutter-btn:active { background: #007bff; transform: scale(0.9); }

        #debug-info { color: #888; font-size: 12px; margin-top: 5px; }
        .item-card { border: 1px solid #333; padding: 15px; margin-top: 10px; background: #1e1e1e; border-radius: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div id="homePage">
        <h2>📦 Smart Inventory</h2>
        <button class="btn-main" onclick="openScanner('add')">➕ SCAN TO ADD</button>
        <button class="btn-orange" onclick="openScanner('take')">➖ SCAN TO TAKE</button>
        <button onclick="showInventory()" style="background:#444; color:white;">📋 VIEW STOCK</button>
    </div>

    <div id="scanPage" class="hidden">
        <h3 id="modeText">Align P/N Barcode</h3>
        <p id="hint" style="color:#007bff">Hold steady & tap when clear</p>
        
        <div id="scanner-wrapper">
            <div id="reader" style="width: 100%;"></div>
        </div>
        
        <div class="shutter-btn" onclick="forceScan()"></div>
        <p>TAP TO SCAN NOW</p>
        <div id="debug-info">Engine: High-Sensitivity Mode</div>
        
        <button onclick="location.reload()" style="background:none; color:#777; border:none; text-decoration:underline; margin-top:20px;">Cancel</button>
    </div>

    <div id="inventoryBox"></div>
</div>

<script>
let mode = "";
let inventory = JSON.parse(localStorage.getItem("inv_v3")) || {};
let html5QrCode;
let lastDetected = "";

function openScanner(m) {
    mode = m;
    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");
    startCamera();
}

function startCamera() {
    html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 30, // Faster frame rate
        qrbox: { width: 320, height: 140 },
        videoConstraints: { 
            facingMode: "environment", 
            width: { ideal: 1920 }, 
            height: { ideal: 1080 },
            focusMode: "continuous"
        }
    };
    
    // We listen in the background, but we don't "force" a transition 
    // until the user clicks the button or a perfect match is found.
    html5QrCode.start({ facingMode: "environment" }, config, (text) => {
        lastDetected = text;
        document.getElementById("hint").innerText = "✨ READY! TAP NOW";
        document.getElementById("hint").style.color = "#28a745";
    }).catch(err => alert("Camera Error: Check HTTPS"));
}

function cleanPN(raw) {
    let code = raw.trim();
    if (code.startsWith("1P")) return code.substring(2);
    if (code.startsWith("P"))  return code.substring(1);
    return code;
}

// 🔥 THE FORCE-SCAN BUTTON
async function forceScan() {
    const hint = document.getElementById("hint");
    
    // If the background engine already has a result, use it immediately
    if (lastDetected) {
        finishScan(lastDetected);
        return;
    }

    // Otherwise, try to "grab" the current frame and decode it manually
    hint.innerText = "⌛ Decoding...";
    hint.style.color = "yellow";

    try {
        // This is a manual "capture and decode" attempt
        const canvas = document.querySelector('#reader video');
        if (canvas) {
            // We give it one more half-second to find a result
            await new Promise(r => setTimeout(r, 500));
            if (lastDetected) {
                finishScan(lastDetected);
            } else {
                hint.innerText = "❌ No code seen. Move phone back.";
                hint.style.color = "red";
            }
        }
    } catch (e) {
        hint.innerText = "❌ Error. Try again.";
    }
}

function finishScan(text) {
    if (navigator.vibrate) navigator.vibrate(100);
    const pn = cleanPN(text);
    
    html5QrCode.stop().then(() => {
        processInventory(pn);
    });
}

function processInventory(pn) {
    if (inventory[pn]) {
        let amount = prompt(`Found P/N: ${pn}\nIn Stock: ${inventory[pn].qty}\n\nAmount to ${mode}:`, "1");
        if (amount) {
            inventory[pn].qty += (mode === 'add' ? parseInt(amount) : -parseInt(amount));
        }
    } else {
        if (mode === 'add') {
            let desc = prompt(`NEW PART: ${pn}\nEnter Description:`, "Electronic Component");
            inventory[pn] = { desc: desc || "No Desc", qty: 1 };
        } else {
            alert("Part Number not found in stock.");
        }
    }
    localStorage.setItem("inv_v3", JSON.stringify(inventory));
    location.reload();
}

function showInventory() {
    let html = "<h3>📋 Stock List</h3>";
    for (let pn in inventory) {
        html += `<div class="item-card"><b>P/N: ${pn}</b><br><small>${inventory[pn].desc}</small><br>Qty: ${inventory[pn].qty}</div>`;
    }
    document.getElementById("inventoryBox").innerHTML = html;
}
</script>
</body>
</html>
