<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA (UNCHANGED)
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 20,
        qrbox: { width: 200, height: 60 },
        aspectRatio: 1.7778,
        disableFlip: false,
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            focusMode: "continuous"
        }
    };

    // 🔥 IMPORTANT: NO BARCODE CALLBACK
    html5QrCode.start(
        { facingMode: "environment" },
        config,
        () => {},   // disable scanner
        () => {}
    ).catch(err => alert(err));
}

// 📸 CAPTURE + OCR
async function captureAndProcess() {
    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const imageFile = await html5QrCode.takePhoto();

        status.innerText = "🧠 Reading P/N...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng',
            { logger: m => console.log(m) }
        );

        let rawText = result.data.text;

        let pn = extractPN(rawText);

        if (!pn) {
            status.innerText = "❌ Cannot detect P/N";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn);

    } catch (err) {
        status.innerText = "❌ OCR Failed";
        console.error(err);
    }
}

// 🔥 SMART P/N EXTRACTION (IMPORTANT)
function extractPN(text) {

    // Remove spaces & symbols
    let cleaned = text
        .replace(/\s+/g, "")
        .replace(/[^A-Za-z0-9\-]/g, "")
        .toUpperCase();

    // Try to find realistic P/N pattern
    let matches = cleaned.match(/[A-Z0-9\-]{4,20}/g);

    if (!matches) return "";

    // Return longest match (usually P/N)
    let pn = matches.sort((a,b) => b.length - a.length)[0];

    return pn;
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS (UNCHANGED)
function processData(pn) {

    html5QrCode.stop().then(() => {

        if (inventory[pn]) {

            let qty = prompt(
                `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
                "1"
            );

            if (qty) {
                if (mode === "add") inventory[pn].qty += parseInt(qty);
                else inventory[pn].qty -= parseInt(qty);
            }

        } else {

            if (mode === "add") {
                let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

                inventory[pn] = {
                    desc: desc || "No Desc",
                    qty: 1
                };
            } else {
                alert("❌ Part not found!");
            }
        }

        localStorage.setItem("full_inv", JSON.stringify(inventory));
        location.reload();

    });
}
</script>
