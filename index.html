<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory System</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
            margin-top: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<h1>Welcome to smart Inventory System</h1>

<div class="container" id="home">
    <h3>Select Action</h3>

    <button onclick="goToAdd()">➕ Add Inventory</button>
    <button onclick="goToTake()">📤 Take Inventory</button>
</div>

<div class="container hidden" id="addPage">
    <h3>➕ Add Inventory</h3>

    <input type="file" id="imageInput">

    <button onclick="processImage()">🔍 Detect</button>

    <input type="text" id="component" placeholder="Component">
    <input type="number" id="quantity" placeholder="Quantity">
    <input type="text" id="location" placeholder="Location">

    <button onclick="saveData()">💾 Save</button>
    <button onclick="goHome()">⬅ Back</button>
</div>

<div class="container hidden" id="takePage">
    <h3>📤 Take Inventory</h3>

    <input type="text" placeholder="Component">
    <input type="number" placeholder="Quantity">

    <button onclick="alert('Function coming soon')">Take</button>
    <button onclick="goHome()"> Back</button>
</div>

<script>

function goToAdd() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("addPage").classList.remove("hidden");
}

function goToTake() {
    document.getElementById("home").classList.add("hidden");
    document.getElementById("takePage").classList.remove("hidden");
}

function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("addPage").classList.add("hidden");
    document.getElementById("takePage").classList.add("hidden");
}

async function processImage() {
    let file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Please upload an image");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);
    formData.append("apikey", "helloworld");

    let response = await fetch("https://api.ocr.space/parse/image", {
        method: "POST",
        body: formData
    });

    let result = await response.json();

    let text = result.ParsedResults[0].ParsedText;

    alert("Detected:\n" + text);

    // Simple auto-fill
    document.getElementById("component").value = text.split("\n")[0];
}

async function saveData() {
    let data = {
        component: document.getElementById("component").value,
        quantity: document.getElementById("quantity").value,
        location: document.getElementById("location").value
    };

    await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
        method: "POST",
        body: JSON.stringify(data)
    });

    alert("✅ Saved to inventory!");
}

</script>

</body>
</html>
