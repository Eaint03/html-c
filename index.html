<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Inventory v17.4 - Diagnostic</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; overflow: hidden; }
        .page { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        button { width: 95%; max-width: 380px; padding: 18px; margin: 6px 0; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--blue); color: white; }
        .btn-capture { background: var(--green); color: white; border: 4px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin-top: 10px; }
        #reader-container { position: relative; width: 100%; max-width: 380px; margin: 5px auto; border-radius: 15px; overflow: hidden; border: 2px solid #444; background: #000; }
        #scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 220px; border: 3px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.7); z-index: 5; pointer-events: none; }
        #status { margin: 10px; color: #00ff00; font-weight: bold; font-size: 1.2rem; min-height: 30px; }
        #debugCanvas { width: 90%; max-width: 340px; background: white; border-radius: 8px; display: block; margin: 10px auto; border: 1px solid #777; }
    </style>
</head>
<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 AI Inventory v17.4</h1>
    <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
    <button class="btn-main" style="background:#333;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Ready</div>
    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>
    <button class="btn-capture" onclick="captureAndScan()">📸 SCAN LABEL</button>
    <button style="background:#cc0000; color:white;" onclick="goTo('homePage')">Exit</button>
    <canvas id="debugCanvas" class="hidden"></canvas>
</div>

<script>
const GOOGLE_API_KEY = "AIzaSyBjzZf1DVzZFuaf9tC5SW8x9bjqp1t7HQQ"; 
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzOLEIsa7GxDLCmWHdVTiYuHfyvXT95wU62PKlXBpVGfhR2L5rgK_yZ4b37Np6VjY7/exec";

let mode = ""; let html5QrCode = null; let processing = false;

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    try { await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {}); } catch (e) { alert("Camera: " + e); }
}

function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    const status = document.getElementById("status");
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");

    status.innerText = "🔍 Contacting Google...";

    const vW = video.videoWidth; const vH = video.videoHeight;
    const cropSize = Math.min(vW, vH) * 0.95; 
    canvas.width = 1200; canvas.height = 1200;
    ctx.drawImage(video, (vW-cropSize)/2, (vH-cropSize)/2, cropSize, cropSize, 0, 0, 1200, 1200);

    const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    const GOOGLE_URL = `https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`;

    try {
        const response = await fetch(GOOGLE_URL, {
            method: "POST",
            body: JSON.stringify({
                requests: [{ image: { content: base64Image }, features: [{ type: "TEXT_DETECTION" }] }]
            })
        });
        
        const data = await response.json();
        
        // --- DIAGNOSTIC CHECK ---
        if (data.error) {
            alert("GOOGLE ERROR CODE " + data.error.code + ":\n" + data.error.message);
            status.innerText = "❌ API Reject";
            processing = false;
            return;
        }

        if (data.responses[0].textAnnotations) {
            let fullText = data.responses[0].textAnnotations[0].description;
            let lines = fullText.split('\n');
            let pn = lines[0] || "N/A";
            
            const finalInput = prompt("AI Found:\n" + pn + "\n\nEdit if needed:", pn);
            if (finalInput) {
                status.innerText = "🚀 Saving...";
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify([{ pn: finalInput, qty: 1, mode: mode, date: new Date().toLocaleString() }]) });
                status.innerText = "✅ Saved!";
                setTimeout(() => status.innerText = "Ready", 2000);
            }
        } else {
            status.innerText = "❌ No Text Found";
        }
    } catch (err) {
        alert("CRITICAL CONNECTION ERROR:\n" + err);
        status.innerText = "❌ Connection Failed";
    }
    processing = false;
}
</script>
</body>
</html>
