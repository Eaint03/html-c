<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Inventory Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:20px; }
.card { background:white; padding:20px; border-radius:10px; }
.video-wrap { position:relative; width:100%; max-width:500px; }
video { width:100%; }
.scan-box-border {
  position:absolute;
  left:10%; top:20%;
  width:80%; height:60%;
  border:2px solid lime;
}
.status-bar { margin-top:10px; padding:10px; background:#eee; }
.status-bar.ok { background:#d4ffd4; }
.status-bar.err { background:#ffd4d4; }
.status-bar.loading { background:#fff3cd; }

.candidate {
  display:block;
  padding:10px;
  margin:5px 0;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}
.candidate:hover { background:#d0f0ff; }
</style>
</head>

<body>

<div class="card">

<h2>Offline MFR PN Scanner</h2>

<div class="video-wrap">
  <video id="video" autoplay playsinline></video>
  <div class="scan-box-border"></div>
</div>

<br>

<button onclick="startCamera()">Start</button>
<button onclick="scan()">Scan</button>

<div id="status" class="status-bar">Ready</div>

<br>

<label>MFR PN</label>
<input id="pn" style="width:100%;font-size:20px;"><br><br>

<label>Description</label>
<input id="desc" style="width:100%;"><br><br>

<!-- 🔥 NEW: Candidate list -->
<div id="candidates"></div>

<img id="preview" style="width:100%;margin-top:10px;">

</div>

<canvas id="canvas" style="display:none"></canvas>
<canvas id="crop" style="display:none"></canvas>

<script>

let stream = null;

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  document.getElementById("video").srcObject = stream;
}

async function scan() {

  const video = document.getElementById("video");
  if (!video.videoWidth) {
    setStatus("Camera not ready", "err");
    return;
  }

  const canvas = document.getElementById("canvas");
  const crop = document.getElementById("crop");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);

  const w = canvas.width * 0.8;
  const h = canvas.height * 0.6;

  crop.width = w;
  crop.height = h;

  crop.getContext("2d").drawImage(
    canvas,
    canvas.width*0.1,
    canvas.height*0.2,
    w,
    h,
    0,
    0,
    w,
    h
  );

  const img = crop.toDataURL("image/jpeg");
  document.getElementById("preview").src = img;

  setStatus("Reading...", "loading");

  const result = await Tesseract.recognize(img, "eng");
  const text = result.data.text;

  console.log(text);

  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 4);

  const candidates = extractCandidates(lines);

  showCandidates(candidates);

  document.getElementById("desc").value =
    lines.find(l => /DIO|IC|RES|CAP/i.test(l)) || "";

  if (candidates.length > 0) {
    setStatus("Select correct PN", "ok");
  } else {
    setStatus("No valid PN found", "err");
  }
}

// 🔥 SMART CANDIDATE ENGINE
function extractCandidates(lines) {

  function fix(t) {
    return t.toUpperCase()
      .replace(/O/g,"0")
      .replace(/I/g,"1")
      .replace(/S/g,"5")
      .replace(/B(?=\d)/g,"8");
  }

  function valid(t) {
    return (
      t.length >= 6 &&
      t.length <= 25 &&
      /[A-Z]/.test(t) &&
      /[0-9]/.test(t) &&
      !t.includes("ROHS") &&
      !t.includes("COMP") &&
      !t.includes("USA") &&
      !t.includes("LOT") &&
      !t.includes("CODE") &&
      !t.endsWith("-ND") &&
      !t.startsWith("1727")
    );
  }

  function score(t) {
    let s = 0;
    if (/[A-Z]/.test(t)) s += 2;
    if (/[0-9]/.test(t)) s += 2;
    if (t.includes("-")) s += 2;
    if (t.length > 10) s += 2;
    return s;
  }

  let list = [];

  for (let line of lines) {
    let t = fix(line);
    if (valid(t)) {
      list.push({ value: t, score: score(t) });
    }
  }

  list.sort((a,b)=>b.score-a.score);

  return list.slice(0,3).map(x=>x.value);
}

// 🔥 SHOW BUTTONS
function showCandidates(list) {
  const box = document.getElementById("candidates");
  box.innerHTML = "";

  list.forEach(pn => {
    const btn = document.createElement("div");
    btn.className = "candidate";
    btn.innerText = pn;

    btn.onclick = () => {
      document.getElementById("pn").value = pn;
      setStatus("PN Selected", "ok");
    };

    box.appendChild(btn);
  });
}

function setStatus(msg, type) {
  const s = document.getElementById("status");
  s.innerText = msg;
  s.className = "status-bar " + type;
}

</script>

</body>
</html>
