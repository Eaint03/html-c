<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart MFR PN Scanner v19.1</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        button { width: 95%; max-width: 380px; padding: 18px; margin: 6px 0; border-radius: 12px; border: none; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-main { background: var(--blue); color: white; }
        .btn-capture { background: var(--green); color: white; border: 4px solid white; }
        .btn-sync { background: #ffcc00; color: #000; display: block; margin-top: 15px; width: 100%; }
        
        #reader-container { position: relative; width: 100%; max-width: 380px; margin: 5px auto; border-radius: 15px; overflow: hidden; border: 2px solid #444; background: #000; }
        #scanner-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; height: 200px; border: 3px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.7); z-index: 5; pointer-events: none; }
        
        #result-card { background: #222; border: 2px solid var(--blue); padding: 15px; border-radius: 12px; width: 90%; max-width: 380px; margin-top: 10px; text-align: left; }
        .label-text { color: #888; font-size: 0.8rem; text-transform: uppercase; }
        .data-text { font-size: 1.2rem; color: #fff; font-family: monospace; margin-bottom: 8px; }
        #status { margin: 10px; color: #00ff00; font-weight: bold; min-height: 24px; }
    </style>
</head>
<body>

<div id="homePage" class="page">
    <h1 style="margin-top: 40px;">📦 Component AI Pro</h1>
    <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Add Stock</button>
    <button class="btn-main" style="background:#333;" onclick="goTo('scanPage', 'take')">➖ Remove Stock</button>
</div>

<div id="scanPage" class="page hidden">
    <div id="status">Ready</div>
    <div id="reader-container">
        <div id="reader"></div>
        <div id="scanner-overlay"></div>
    </div>
    
    <button class="btn-capture" id="capBtn" onclick="captureAndScan()">📸 SCAN LABEL</button>

    <div id="result-area" class="hidden">
        <div id="result-card">
            <div class="label-text">Identified MFR Part Number</div>
            <div id="resPN" class="data-text">---</div>
            <div class="label-text">Description</div>
            <div id="resDesc" class="data-text">---</div>
            
            <button class="btn-sync" onclick="syncToSheet()">🚀 SYNC TO GOOGLE SHEET</button>
        </div>
        <button style="background:transparent; color:#aaa; margin-top:10px;" onclick="resetScan()">Retake Photo</button>
    </div>

    <button style="background:#cc0000; color:white; margin-top:20px;" onclick="goTo('homePage')">Exit</button>
    <canvas id="debugCanvas" class="hidden"></canvas>
</div>

<script>
const GOOGLE_API_KEY = "AIzaSyBjzZf1DVzZFuaf9tC5SW8x9bjqp1t7HQQ"; 
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzOLEIsa7GxDLCmWHdVTiYuHfyvXT95wU62PKlXBpVGfhR2L5rgK_yZ4b37Np6VjY7/exec";

let mode = ""; let html5QrCode = null; let processing = false;
let detectedData = { pn: "", desc: "", qty: 1 };

function goTo(pageId, m = "") {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(pageId).classList.remove('hidden');
    if (pageId === 'scanPage') { mode = m; initScanner(); resetScan(); } else { killScanner(); }
}

async function initScanner() {
    html5QrCode = new Html5Qrcode("reader");
    try { await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {}); } catch (e) { alert(e); }
}

function killScanner() { if (html5QrCode) html5QrCode.stop().catch(() => {}); }

function resetScan() {
    document.getElementById("result-area").classList.add("hidden");
    document.getElementById("capBtn").classList.remove("hidden");
    document.getElementById("status").innerText = "Ready";
    processing = false;
}

async function captureAndScan() {
    if (processing) return;
    const video = document.querySelector("#reader video");
    if (!video) return;

    processing = true;
    document.getElementById("status").innerText = "🔍 Analyzing Patterns...";

    const vW = video.videoWidth; const vH = video.videoHeight;
    const cropSize = Math.min(vW, vH) * 0.95; 
    const canvas = document.getElementById("debugCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 1200; canvas.height = 1200;
    ctx.drawImage(video, (vW-cropSize)/2, (vH-cropSize)/2, cropSize, cropSize, 0, 0, 1200, 1200);

    const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
    const GOOGLE_URL = `https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_API_KEY}`;

    try {
        const response = await fetch(GOOGLE_URL, {
            method: "POST",
            body: JSON.stringify({
                requests: [{ image: { content: base64Image }, features: [{ type: "TEXT_DETECTION" }] }]
            })
        });
        const data = await response.json();
        const lines = data.responses[0].textAnnotations[0].description.split('\n');
        
        let bestPn = ""; let highestScore = -100; let bestDesc = "Electronic Component";

        lines.forEach((line) => {
            let clean = line.trim().toUpperCase();
            let score = 0;

            // SCORING: MFR PN Patterns
            if (/^(GRM|LQH|IPD|IPP|BSC|TLE|BTS|ERJ|BZT|MAX|LM|STM)/.test(clean)) score += 60;
            if (clean.includes('-') && clean.length > 6) score += 25;
            if (clean.length > 8 && clean.length < 20) score += 15;
            
            // Penalize Distributor specific noise
            if (clean.endsWith("-ND") || clean.includes("DIGIKEY") || clean.startsWith("PO#") || clean.includes("MOUSER")) score -= 100;
            if (clean.includes("/") || clean.includes(":")) score -= 50;

            if (score > highestScore) { highestScore = score; bestPn = clean.replace(/\s/g, ""); }
            if (clean.includes('DIODE') || clean.includes('MOSFET') || clean.includes('RESISTOR') || clean.includes('CAPACITOR')) bestDesc = clean;
        });

        detectedData = { pn: bestPn, desc: bestDesc, qty: 1 };
        document.getElementById("resPN").innerText = bestPn;
        document.getElementById("resDesc").innerText = bestDesc;
        document.getElementById("status").innerText = "✅ Pattern Identified";
        document.getElementById("result-area").classList.remove("hidden");
        document.getElementById("capBtn").classList.add("hidden");

    } catch (err) { document.getElementById("status").innerText = "❌ Error"; processing = false; }
}

async function syncToSheet() {
    document.getElementById("status").innerText = "🚀 Syncing...";
    await fetch(SCRIPT_URL, { 
        method: "POST", mode: "no-cors", 
        body: JSON.stringify([{ ...detectedData, mode: mode, date: new Date().toLocaleString() }]) 
    });
    document.getElementById("status").innerText = "✅ Saved to Inventory!";
    setTimeout(resetScan, 2000);
}
</script>
</body>
</html>
