<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Inventory Pro</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        :root { --blue: #007bff; --green: #28a745; --red: #dc3545; --dark: #121212; --card: #1e1e1e; }
        body { font-family: -apple-system, sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .page { padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        button { 
            width: 90%; max-width: 350px; padding: 16px; margin: 10px 0; 
            border-radius: 12px; border: none; font-size: 16px; font-weight: bold; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-main { background: var(--blue); color: white; }
        .btn-secondary { background: #333; color: white; }
        .btn-review { background: #6f42c1; color: white; }
        .btn-sync { background: var(--green); color: white; width: 100%; }
        .btn-danger { background: var(--red); color: white; }

        #reader-container { 
            position: relative; width: 100%; max-width: 400px; 
            margin: 15px auto; border-radius: 15px; overflow: hidden; border: 2px solid #333;
        }
        #scanner-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 60px; border: 3px solid #00ff00;
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6); z-index: 5; pointer-events: none;
        }

        .review-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 15px; padding: 15px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #333; font-size: 14px; }
        th { color: #888; text-transform: uppercase; font-size: 11px; }
        .del-btn { color: var(--red); font-weight: bold; padding: 5px; cursor: pointer; }

        #status { margin: 10px; color: #00ff00; font-weight: bold; height: 20px; font-size: 14px; }
        #debugCanvas { width: 100%; max-width: 350px; background: white; border-radius: 8px; margin-top: 10px; }
        .badge { background: var(--red); padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="homePage" class="page">
        <h1 style="margin-top: 40px;">📦 Smart Inventory</h1>
        <p style="color: #888;">Precision OCR Tracker</p>
        
        <button class="btn-main" onclick="goTo('scanPage', 'add')">➕ Scan to ADD</button>
        <button class="btn-secondary" onclick="goTo('scanPage', 'take')">➖ Scan to REMOVE</button>
        
        <div style="margin: 20px 0; width: 80%; border-top: 1px solid #333;"></div>
        
        <button class="btn-review" onclick="goTo('reviewPage')">
            📋 Review Scans <span id="countBadge" class="badge">0</span>
        </button>
    </div>

    <div id="scanPage" class="page hidden">
        <h2 id="modeTitle">Scanning...</h2>
        <div id="status">Initializing...</div>

        <div id="reader-container">
            <div id="reader"></div>
            <div id="scanner-overlay"></div>
        </div>

        <button class="btn-danger" onclick="goTo('homePage')">Exit Scanner</button>
        <div style="font-size: 10px; color: #555;">AI VIEW (CONTRAST ENHANCED)</div>
        <canvas id="debugCanvas"></canvas>
    </div>

    <div id="reviewPage" class="page hidden">
        <h2>📋 Review & Sync</h2>
        <div class="review-card">
            <table id="reviewTable">
                <thead>
                    <tr>
                        <th>P/N</th>
                        <th>Qty</th>
                        <th>Type</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="reviewList"></tbody>
            </table>
        </div>

        <button class="btn-sync" id="syncBtn" onclick="syncData()">🚀 Sync to Google Sheets</button>
        <button class="btn-secondary" onclick="goTo('homePage')">Back to Home</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec";
        
        let mode = "";
        let html5QrCode = null;
        let scanTimer = null;
        let processing = false;
        let pendingList = JSON.parse(localStorage.getItem("inv_pending")) || [];

        // Sensitivity Improvements
        let lastMatch = "";
        let matchStreak = 0;

        function goTo(pageId, m = "") {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');

            if (pageId === 'scanPage') {
                mode = m;
                document.getElementById('modeTitle').innerText = (m === 'add' ? "Add Stock" : "Remove Stock");
                initScanner();
            } else {
                killScanner();
                if (pageId === 'reviewPage') renderTable();
                if (pageId === 'homePage') updateBadge();
            }
        }

        async function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            try {
                // High FPS for better tracking
                await html5QrCode.start({ facingMode: "environment" }, { fps: 20, aspectRatio: 1.0 }, () => {}, () => {});
                document.getElementById("status").innerText = "Align Part Number...";
                scanTimer = setInterval(takeStep, 1000); 
            } catch (e) { alert(e); }
        }

        function killScanner() {
            clearInterval(scanTimer);
            if (html5QrCode) html5QrCode.stop().catch(() => {});
        }

        async function takeStep() {
            if (processing) return;
            const video = document.querySelector("#reader video");
            if (!video || video.readyState < 2) return;

            processing = true;
            const canvas = document.getElementById("debugCanvas");
            const ctx = canvas.getContext("2d");

            // Tighter crop for better focus
            const vW = video.videoWidth; const vH = video.videoHeight;
            const cropW = vW * 0.75; const cropH = vH * 0.15; 
            const sx = (vW - cropW) / 2; const sy = (vH - cropH) / 2;

            canvas.width = 800; canvas.height = 160; 
            // Extreme contrast for OCR accuracy
            ctx.filter = 'grayscale(1) contrast(3) brightness(1.1)';
            ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                try {
                    const res = await Tesseract.recognize(blob, 'eng', { 
                        tessedit_pageseg_mode: 7,
                        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-'
                    });

                    const conf = res.data.confidence;
                    const text = res.data.text.trim().match(/[A-Z0-9-]{4,}/g);
                    
                    if (text && conf > 70) {
                        const currentPN = text.reduce((a, b) => a.length > b.length ? a : b);
                        
                        // DEBOUNCE LOGIC: Check if it's the same result twice
                        if (currentPN === lastMatch) {
                            matchStreak++;
                        } else {
                            lastMatch = currentPN;
                            matchStreak = 0;
                        }

                        if (matchStreak >= 1) { // Confirmed match
                            document.getElementById("status").innerText = "✅ CONFIRMED: " + currentPN;
                            if (navigator.vibrate) navigator.vibrate(50);
                            
                            setTimeout(() => {
                                const q = prompt(`PART: ${currentPN}\nQuantity:`, "1");
                                if (q) {
                                    pendingList.push({ pn: currentPN, qty: parseInt(q), mode: mode, date: new Date().toLocaleString() });
                                    localStorage.setItem("inv_pending", JSON.stringify(pendingList));
                                }
                                lastMatch = ""; matchStreak = 0; processing = false;
                            }, 100);
                        } else {
                            document.getElementById("status").innerText = "🔍 Stabilizing: " + currentPN;
                            processing = false;
                        }
                    } else {
                        document.getElementById("status").innerText = "Searching...";
                        processing = false;
                    }
                } catch (e) { processing = false; }
            }, "image/jpeg", 0.9);
        }

        function renderTable() {
            const tbody = document.getElementById("reviewList");
            tbody.innerHTML = "";
            pendingList.forEach((item, i) => {
                tbody.innerHTML += `<tr>
                    <td>${item.pn}</td>
                    <td>${item.qty}</td>
                    <td style="color:${item.mode=='add'?'#28a745':'#dc3545'}">${item.mode.toUpperCase()}</td>
                    <td class="del-btn" onclick="removeItem(${i})">✕</td>
                </tr>`;
            });
            document.getElementById("syncBtn").style.display = pendingList.length ? "block" : "none";
        }

        function removeItem(i) {
            pendingList.splice(i, 1);
            localStorage.setItem("inv_pending", JSON.stringify(pendingList));
            renderTable();
        }

        async function syncData() {
            if (pendingList.length === 0) return;
            const btn = document.getElementById("syncBtn");
            btn.innerText = "⏳ Uploading..."; btn.disabled = true;

            try {
                await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(pendingList) });
                alert("Success! Google Sheets updated.");
                pendingList = [];
                localStorage.setItem("inv_pending", JSON.stringify(pendingList));
                goTo('homePage');
            } catch (e) { alert("Network Error"); }
            btn.innerText = "🚀 Sync to Google Sheets"; btn.disabled = false;
        }

        function updateBadge() { document.getElementById("countBadge").innerText = pendingList.length; }
        updateBadge();
    </script>
</body>
</html>
