<!DOCTYPE html>
<html>
<head>
    <title>Barcode Inventory System</title>
</head>

<body>

<h2>📦 Scan Barcode</h2>

<input type="file" accept="image/*" capture="environment" id="fileInput">

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader();

document.getElementById('fileInput').addEventListener('change', function (e) {

    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.src = URL.createObjectURL(file);

    img.onload = function () {

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        codeReader.decodeFromCanvas(canvas)
            .then(result => {

                let barcode = result.text;

                console.log("Barcode:", barcode);

                saveToSheet(barcode);

            })
            .catch(err => {
                alert("❌ Barcode not detected. Try again.");
            });
    };
});

async function saveToSheet(barcode) {

    await fetch("https://script.google.com/macros/s/AKfycbzsX55cEf1cHBXWPgBz-ypLiLz8rZ06IgKZp7edJBsyvwpAzY0riHamRz-ay8S1whV15w/exec", {
        method: "POST",
        body: JSON.stringify({
            component: barcode,
            quantity: "",
            location: ""
        })
    });

    alert("✅ Saved:\n" + barcode);
}

</script>

</body>
</html>
