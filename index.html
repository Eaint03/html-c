<!DOCTYPE html>
<html>
<head>
    <title>Smart Inventory OCR</title>

    <!-- LIBRARIES -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        .hidden { display: none; }

        button {
            padding: 15px;
            margin: 10px;
            width: 200px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            background: #007bff;
            color: white;
        }

        #reader {
            width: 100%;
            max-width: 350px;
            margin: auto;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
        }

        #guide {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- HOME -->
<div id="homePage">
    <h1>📦 Smart Inventory</h1>
    <button onclick="openScanner('add')">➕ Add Item</button>
    <button onclick="openScanner('take')">➖ Take Item</button>
</div>

<!-- SCANNER -->
<div id="scanPage" class="hidden">
    <h2>📸 Scan Label</h2>

    <div id="reader"></div>

    <p id="guide">
        📌 Aim at "MFR PN" line<br>
        📌 Move closer & avoid reflection
    </p>

    <button onclick="captureAndProcess()">📸 Capture</button>
    <button onclick="stopScanner()">❌ Cancel</button>

    <p id="status"></p>
</div>

<script>
let mode = "";
let html5QrCode;
let inventory = JSON.parse(localStorage.getItem("full_inv")) || {};

// OPEN CAMERA
function openScanner(m) {
    mode = m;

    document.getElementById("homePage").classList.add("hidden");
    document.getElementById("scanPage").classList.remove("hidden");

    html5QrCode = new Html5Qrcode("reader");

    const config = {
        fps: 10, // 🔥 reduce lag
        qrbox: { width: 280, height: 120 },
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 }
        }
    };

    html5QrCode.start(
        { facingMode: "environment" },
        config,
        () => {},
        () => {}
    ).catch(err => alert(err));
}

// 📸 CAPTURE + OCR
async function captureAndProcess() {
    const status = document.getElementById("status");

    try {
        status.innerText = "📸 Capturing...";

        const imageFile = await html5QrCode.takePhoto();

        // 🔥 STOP CAMERA BEFORE OCR (IMPORTANT)
        await html5QrCode.stop();

        status.innerText = "🧠 Reading MFR PN...";

        const result = await Tesseract.recognize(
            imageFile,
            'eng',
            {
                tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-.,',
                logger: m => console.log(m)
            }
        );

        let rawText = result.data.text;

        let pn = extractPN(rawText);

        // 🔥 CONFIRM / EDIT
        if (!pn) {
            pn = prompt("❌ Cannot detect MFR PN.\nEnter manually:");
        } else {
            pn = prompt(`Detected MFR PN:\n${pn}\n\nConfirm or edit:`, pn);
        }

        if (!pn) {
            status.innerText = "❌ No input";
            return;
        }

        status.innerText = "✅ " + pn;

        processData(pn.toUpperCase());

    } catch (err) {
        status.innerText = "❌ OCR Failed";
        console.error(err);
    }
}

// 🔥 EXTRACT ONLY MFR PN
function extractPN(text) {

    text = text.toUpperCase();
    text = text.replace(/\n/g, " ");

    // 🔥 Find "MFR PN"
    let mfr = text.match(/MFR\s*PN[:\s]*([A-Z0-9\-\,\.]+)/);

    if (mfr && mfr[1]) return mfr[1];

    // fallback if OCR misses space
    let fallback = text.match(/MFRPN\s*([A-Z0-9\-\,\.]+)/);

    if (fallback && fallback[1]) return fallback[1];

    return "";
}

// STOP
function stopScanner() {
    if (html5QrCode) {
        html5QrCode.stop().then(() => location.reload());
    }
}

// PROCESS INVENTORY
function processData(pn) {

    if (inventory[pn]) {

        let qty = prompt(
            `P/N: ${pn}\nStock: ${inventory[pn].qty}\n\nQty to ${mode}:`,
            "1"
        );

        if (qty) {
            if (mode === "add") inventory[pn].qty += parseInt(qty);
            else inventory[pn].qty -= parseInt(qty);
        }

    } else {

        if (mode === "add") {
            let desc = prompt(`New Part: ${pn}\nEnter Description:`, "Component");

            inventory[pn] = {
                desc: desc || "No Desc",
                qty: 1
            };
        } else {
            alert("❌ Part not found!");
        }
    }

    localStorage.setItem("full_inv", JSON.stringify(inventory));
    location.reload();
}
</script>

</body>
</html>
